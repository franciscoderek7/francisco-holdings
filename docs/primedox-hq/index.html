<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PrimeDox AI HQ</title>
<link rel="manifest" href="/primedox-hq/manifest.json">
<style>
:root { --emerald: #00d4ff; --gold: #d4af37; --bg: #05070a; }
body { margin: 0; background: var(--bg); color: var(--emerald); font-family: Arial, sans-serif; }
.layout { display: grid; grid-template-columns: 1fr 2fr; height: 100vh; }
.sidebar { border-right: 1px solid #00d4ff33; padding: 12px; }
.main { padding: 12px; display: flex; flex-direction: column; }
button { background: var(--gold); border: none; padding: 10px; cursor: pointer; font-weight: bold; color: #000; margin: 5px 0; }
textarea, input { width: 100%; background: #0b0f14; color: var(--emerald); border: 1px solid #00d4ff33; padding: 8px; box-sizing: border-box; }
.chat { flex: 1; overflow: auto; border: 1px solid #00d4ff33; margin-bottom: 10px; padding: 10px; }
.msg { margin: 6px 0; }
.user { color: white; }
.ai { color: var(--emerald); }
#status { margin-top: 20px; font-size: 12px; color: #d4af37; }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h2 style="color: var(--gold);">PrimeDox AI HQ</h2>
    <button onclick="switchTab('chat')">AI Chat</button>
    <button onclick="switchTab('generate')">Generate Document</button>
    <button onclick="switchTab('pricing')">Pricing</button>
    <hr />
    <div id="status">Ready</div>
  </div>
  <div class="main">
    <div id="chatTab">
      <div id="chat" class="chat"></div>
      <input id="input" placeholder="Ask PrimeDox AI..." onkeypress="if(event.key==='Enter')send()" />
      <button onclick="send()">Send</button>
    </div>
    <div id="generateTab" style="display:none;">
      <h3>Document Generator</h3>
      <select id="template">
        <option>Legal Contract</option>
        <option>Business Proposal</option>
        <option>AI Policy Document</option>
        <option>Creative Script</option>
      </select>
      <textarea id="prompt" rows="8" placeholder="Describe document..."></textarea>
      <button onclick="generate()">Generate</button>
      <pre id="output" style="background:#0b0f14;padding:10px;border:1px solid #00d4ff33;white-space:pre-wrap;"></pre>
      <button onclick="exportDoc()">Export PDF</button>
    </div>
    <div id="pricingTab" style="display:none;">
      <h3>Pricing</h3>
      <p style="color:#d4af37;">PrimeDox AI Legal Intelligence Platform</p>
      <button onclick="pay(29)">Starter — $29</button>
      <button onclick="pay(99)">Pro — $99</button>
      <button onclick="pay(299)">Empire — $299</button>
    </div>
  </div>
</div>
<script>
function switchTab(tab) {
  document.getElementById("chatTab").style.display = tab === "chat" ? "block" : "none";
  document.getElementById("generateTab").style.display = tab === "generate" ? "block" : "none";
  document.getElementById("pricingTab").style.display = tab === "pricing" ? "block" : "none";
}
function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");
  const text = input.value; input.value = "";
  chat.innerHTML += '<div class="msg user">You: ' + text + '</div>';
  const replies = {
    contract: "I can generate legally structured contract drafts with clause separation and risk scoring.",
    policy: "Policy framework initialized: compliance, enforcement, audit tracking enabled.",
    legal: "Legal analysis mode active. Constitutional advocacy and cannabis law expertise loaded."
  };
  let reply = "PrimeDox AI is processing your request across legal + business intelligence layers.";
  for (const key in replies) { if (text.toLowerCase().includes(key)) reply = replies[key]; }
  setTimeout(() => chat.innerHTML += '<div class="msg ai">PrimeDox: ' + reply + '</div>', 500);
}
function generate() {
  const prompt = document.getElementById("prompt").value;
  const template = document.getElementById("template").value;
  document.getElementById("output").textContent = '=== PRIME DOX AI GENERATED DOCUMENT ===\n\nTemplate: ' + template + '\n\nContent:\n' + prompt + '\n\n---------------------------------------\nRisk Score: LOW-MEDIUM (simulated)\nGenerated by PrimeDox AI HQ\n---------------------------------------';
}
function exportDoc() {
  const text = document.getElementById("output").textContent;
  const blob = new Blob([text], { type: "application/pdf" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "primedox-document.pdf"; a.click();
}
function pay(amount) {
  window.open('https://paypal.me/techpetcage?amount=' + amount, '_blank');
}
</script>
</body>
</html>
