<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FFD700">
<title>Francisco Holdings Inc — Floor 1 Lobby</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05060a;color:#d4af37;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;min-height:100vh}
#canvas-container{position:fixed;inset:0;z-index:1}
#ui{position:fixed;z-index:10;pointer-events:none;width:100%;height:100%}
#ui>*{pointer-events:auto}
.lobby-sign{position:absolute;top:24px;left:50%;transform:translateX(-50%);text-align:center}
.lobby-sign h1{font-size:14px;letter-spacing:8px;text-transform:uppercase;color:#d4af37}
.lobby-sign p{font-size:10px;color:#555;letter-spacing:4px;margin-top:4px}
.elevator-panel{position:absolute;right:24px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.8);border:1px solid #d4af37;border-radius:12px;padding:16px;width:100px}
.elevator-panel h3{font-size:10px;letter-spacing:2px;color:#d4af37;margin-bottom:12px;text-align:center}
.floor-btn{display:block;width:100%;background:#1a1209;border:1px solid #333;color:#888;padding:8px;margin-bottom:6px;border-radius:4px;font-size:11px;cursor:pointer;text-align:center;text-decoration:none}
.floor-btn:hover,.floor-btn.active{border-color:#d4af37;color:#d4af37;background:rgba(212,175,55,0.1)}
.audio-control{position:absolute;bottom:24px;left:24px;background:rgba(0,0,0,0.8);border:1px solid #d4af37;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px}
.info-card{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);border:1px solid #d4af37;border-radius:12px;padding:16px 24px;text-align:center;max-width:300px}
.info-card h2{font-size:16px;color:#FFD700;margin-bottom:4px}
.info-card p{font-size:12px;color:#aaa}
#loading{position:fixed;inset:0;background:#05060a;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#loading h1{font-size:20px;letter-spacing:6px;color:#d4af37}
#loading .bar{width:200px;height:2px;background:#222;margin-top:16px;overflow:hidden}
#loading .bar::after{content:'';display:block;width:40%;height:100%;background:#d4af37;animation:load 1.5s infinite}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(250%)}}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
<div id="loading"><h1>FRANCISCO HOLDINGS</h1><p style="color:#555;font-size:12px">Entering Lobby...</p><div class="bar"></div></div>
<div id="canvas-container"></div>
<div id="ui">
<div class="lobby-sign">
<h1>Francisco Holdings Inc</h1>
<p>Floor 1 — Empire Lobby</p>
</div>
<div class="elevator-panel">
<h3>ELEVATOR</h3>
<a href="../floor1/index.html" class="floor-btn active">1 HQ</a>
<a href="../floor2/index.html" class="floor-btn">2 Omni</a>
<a href="../floor3/index.html" class="floor-btn">3 Prime</a>
<a href="../floor4/index.html" class="floor-btn">4 CCLDR</a>
<a href="../floor5/index.html" class="floor-btn">5 Tech</a>
<a href="../floor6/index.html" class="floor-btn">6 Clean</a>
<a href="../floor7/index.html" class="floor-btn">7 Vault</a>
<a href="../floor8/index.html" class="floor-btn">8 VIGI</a>
<a href="../floor9/index.html" class="floor-btn">9 Weed</a>
<a href="../floor10/index.html" class="floor-btn">10 BENO</a>
</div>
<div class="audio-control" id="audioBtn" onclick="toggleAudio()">🔇</div>
<div class="info-card">
<h2>Welcome to the Empire</h2>
<p>10 floors. 10 companies. One command.</p>
</div>
</div>

<script>
// Audio Context for lobby ambient sound
let audioCtx, oscillator, gainNode, isPlaying=false;
function initAudio(){
audioCtx=new (window.AudioContext||window.webkitAudioContext)();
oscillator=audioCtx.createOscillator();
gainNode=audioCtx.createGain();
oscillator.type='sine';
oscillator.frequency.setValueAtTime(110,audioCtx.currentTime);
gainNode.gain.setValueAtTime(0.03,audioCtx.currentTime);
oscillator.connect(gainNode);
gainNode.connect(audioCtx.destination);
oscillator.start();
isPlaying=true;
document.getElementById('audioBtn').textContent='🔊';
}
function toggleAudio(){
if(!audioCtx)initAudio();
else if(isPlaying){gainNode.gain.setValueAtTime(0,audioCtx.currentTime);isPlaying=false;document.getElementById('audioBtn').textContent='🔇';}
else{gainNode.gain.setValueAtTime(0.03,audioCtx.currentTime);isPlaying=true;document.getElementById('audioBtn').textContent='🔊';}
}

// Three.js Lobby Scene
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x05060a);
scene.fog=new THREE.FogExp2(0x05060a,0.02);

const camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,100);
camera.position.set(0,3,8);

const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

const ambient=new THREE.AmbientLight(0xffffff,0.3);
scene.add(ambient);
const dirLight=new THREE.DirectionalLight(0xFFD700,0.8);
dirLight.position.set(5,10,5);
scene.add(dirLight);
const pointLight=new THREE.PointLight(0xFFD700,1,20);
pointLight.position.set(0,5,0);
scene.add(pointLight);

// Floor
const floorGeo=new THREE.PlaneGeometry(20,20);
const floorMat=new THREE.MeshStandardMaterial({color:0x1a1209,metalness:0.8,roughness:0.2});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;
scene.add(floor);

// Empire Logo (Rotating Gold Ring)
const ringGeo=new THREE.TorusGeometry(2,0.1,16,100);
const ringMat=new THREE.MeshStandardMaterial({color:0xFFD700,metalness:1,roughness:0.1,emissive:0xFFD700,emissiveIntensity:0.3});
const ring=new THREE.Mesh(ringGeo,ringMat);
ring.position.y=3;
scene.add(ring);

const ring2=ring.clone();
ring2.scale.set(1.5,1.5,1.5);
ring2.rotation.x=Math.PI/2;
scene.add(ring2);

// Floating cubes (representing companies)
const companies=[];
const colors=[0xFFD700,0x00d4ff,0x00ff88,0xd4af37,0xFF6B35,0x00CED1,0xC0C0C0,0x8B0000,0x228B22,0x32CD32];
for(let i=0;i<10;i++){
const geo=new THREE.BoxGeometry(0.4,0.4,0.4);
const mat=new THREE.MeshStandardMaterial({color:colors[i],metalness:0.7,roughness:0.3,emissive:colors[i],emissiveIntensity:0.2});
const mesh=new THREE.Mesh(geo,mat);
const angle=(i/10)*Math.PI*2;
mesh.position.set(Math.cos(angle)*3,1+Math.sin(i)*0.5,Math.sin(angle)*3);
mesh.userData={floorIndex:i};
scene.add(mesh);
companies.push(mesh);
}

// Stars
const starsGeo=new THREE.BufferGeometry();
const sCount=500;
const sPos=new Float32Array(sCount*3);
for(let i=0;i<sCount*3;i++)sPos[i]=(Math.random()-0.5)*100;
starsGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
const starsMat=new THREE.PointsMaterial({color:0xffffff,size:0.1,transparent:true,opacity:0.5});
const stars=new THREE.Points(starsGeo,starsMat);
scene.add(stars);

// Raycaster for clicking companies
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
window.addEventListener('click',(e)=>{
mouse.x=(e.clientX/window.innerWidth)*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;
raycaster.setFromCamera(mouse,camera);
const hits=raycaster.intersectObjects(companies);
if(hits.length>0){
const idx=hits[0].object.userData.floorIndex;
window.location.href=`../floor${idx+1}/index.html`;
}
});

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

function animate(){
requestAnimationFrame(animate);
ring.rotation.y+=0.005;
ring.rotation.x+=0.002;
ring2.rotation.y-=0.003;
companies.forEach((c,i)=>{
c.rotation.y+=0.01;
c.position.y=1+Math.sin(Date.now()*0.001+i)*0.3;
});
stars.rotation.y+=0.0002;
renderer.render(scene,camera);
}

setTimeout(()=>{
document.getElementById('loading').style.display='none';
animate();
},1500);

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}
</script>
</body>
</html>
