<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>Kiaros | Next Generation Platform</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#ui *{pointer-events:auto}
h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2.6rem;font-weight:200;letter-spacing:10px;text-transform:uppercase;background:linear-gradient(135deg,#ff00ff,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 50px rgba(255,0,255,.3)}

</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK</div><h1>KIAROS</h1><p class="sub">Next Generation Platform | Floor 10</p><div class="tag">AGENT SWARM ACTIVE • KIAROS ONLINE • FULL AUTOMATION</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">ENTER KIAROS — $99</a><div class="badge">FLOOR 10 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,20,80);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.1;
document.getElementById("c").appendChild(r.domElement);
s.add(new THREE.AmbientLight(0x1a001a,.4));
const g=new THREE.PointLight(0xff00ff,1.5,400);g.position.set(0,50,100);s.add(g);
const b=new THREE.PointLight(0x00ffff,1,400);b.position.set(-80,30,-50);s.add(b);

// Crystal structure
const crystal=new THREE.Group();
const shardMat=new THREE.MeshPhysicalMaterial({color:0x000,roughness:.1,metalness:.9,emissive:0xff00ff,emissiveIntensity:.3,transparent:true,opacity:.8,transmission:.3,thickness:2,clearcoat:1});
for(let i=0;i<8;i++){
  const shard=new THREE.Mesh(new THREE.ConeGeometry(3,15,4),shardMat);
  const a=i/8*Math.PI*2;
  shard.position.set(Math.cos(a)*12,20,Math.sin(a)*12);
  shard.rotation.z=Math.PI/6;shard.rotation.y=a;
  crystal.add(shard);
}
const coreMat=new THREE.MeshPhysicalMaterial({color:0x000,roughness:.1,metalness:.9,emissive:0x00ffff,emissiveIntensity:.5,transmission:.4,thickness:3,clearcoat:1});
const core=new THREE.Mesh(new THREE.OctahedronGeometry(8,0),coreMat);core.position.y=20;crystal.add(core);
s.add(crystal);

// Crystal particles
const pGeo=new THREE.BufferGeometry(),pCount=2e3,pPos=new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){pPos[i*3]=(Math.random()-.5)*200;pPos[i*3+1]=Math.random()*80;pPos[i*3+2]=(Math.random()-.5)*200;}
pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({size:.8,color:0xff00ff,transparent:true,opacity:.4});
const particles=new THREE.Points(pGeo,pMat);s.add(particles);

let mx=0,my=0,ty=20,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.05;ty=Math.max(10,Math.min(ty,80))});
function a(){requestAnimationFrame(a);t+=.005;
crystal.rotation.y+=.003;core.rotation.y+=.01;core.rotation.x+=.005;
particles.rotation.y+=.0003;
c.position.x+=(mx*20-c.position.x)*.02;c.position.y+=(ty-c.position.y)*.05;c.position.z=80+Math.sin(t)*5;c.lookAt(0,20,0);r.render(s,c);
}a();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script></body></html>
