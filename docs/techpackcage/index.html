<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>TechPackCage | Smart Packaging</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#ui *{pointer-events:auto}
h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2.6rem;font-weight:200;letter-spacing:10px;text-transform:uppercase;background:linear-gradient(135deg,#ff8800,#0088ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 50px rgba(255,136,0,.3)}
p.sub{position:absolute;top:64px;left:50%;transform:translateX(-50%);color:#666;font-size:.75rem;letter-spacing:4px}
.tag{position:absolute;top:95px;left:50%;transform:translateX(-50%);color:#ff8800;font-size:.6rem;letter-spacing:3px;border:1px solid rgba(255,136,0,.3);padding:4px 14px;border-radius:10px;background:rgba(255,136,0,.05)}
.badge{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,136,255,.08);border:1px solid rgba(255,136,0,.3);padding:10px 28px;border-radius:20px;color:#ff8800;font-size:.8rem;letter-spacing:2px}

</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK</div><h1>TECHPACKCAGE</h1><p class="sub">Smart Packaging Technology | Floor 12</p><div class="tag">AGENT SWARM ACTIVE • PACKAGING ONLINE • FULL AUTOMATION</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">PACK SMART — $29+</a><div class="badge">FLOOR 12 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,15,80);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.1;
document.getElementById("c").appendChild(r.domElement);
s.add(new THREE.AmbientLight(0x1a0a00,.4));
const g=new THREE.PointLight(0xff8800,1.5,400);g.position.set(0,50,100);s.add(g);
const b=new THREE.PointLight(0x0088ff,1,400);b.position.set(-80,30,-50);s.add(b);

// Conveyor belt
const beltMat=new THREE.MeshStandardMaterial({color:0x222,metalness:.9,roughness:.1});
const belt=new THREE.Mesh(new THREE.BoxGeometry(80,2,10),beltMat);belt.position.y=1;s.add(belt);

// Moving boxes
const boxMat=new THREE.MeshPhysicalMaterial({color:0xff8800,metalness:.5,roughness:.3,emissive:0xff8800,emissiveIntensity:.1,clearcoat:1});
const boxes=[];
for(let i=0;i<10;i++){
  const box=new THREE.Mesh(new THREE.BoxGeometry(4,4,4),boxMat);
  box.position.set((i-5)*8,5,0);boxes.push(box);s.add(box);
}

// Packaging particles
const pGeo=new THREE.BufferGeometry(),pCount=2e3,pPos=new Float32Array(pCount*3);
for(let i=0;i<pCount;i++){pPos[i*3]=(Math.random()-.5)*200;pPos[i*3+1]=Math.random()*80;pPos[i*3+2]=(Math.random()-.5)*200;}
pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
const pMat=new THREE.PointsMaterial({size:.8,color:0xff8800,transparent:true,opacity:.4});
const particles=new THREE.Points(pGeo,pMat);s.add(particles);

let mx=0,my=0,ty=15,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.05;ty=Math.max(10,Math.min(ty,60))});
function a(){requestAnimationFrame(a);t+=.005;
boxes.forEach((bx,i)=>{bx.position.x=((i-5)*8+t*10)%80-40;bx.rotation.y+=.01});
particles.rotation.y+=.0003;
c.position.x+=(mx*20-c.position.x)*.02;c.position.y+=(ty-c.position.y)*.05;c.position.z=80+Math.sin(t)*5;c.lookAt(0,10,0);r.render(s,c);
}a();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script></body></html>
