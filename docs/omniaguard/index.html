<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>OmniGuard | Agentic AI Cybersecurity</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#ui *{pointer-events:auto}
h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2.6rem;font-weight:200;letter-spacing:10px;text-transform:uppercase;background:linear-gradient(135deg,#00ff00,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 50px rgba(0,255,0,.3)}
p.sub{position:absolute;top:64px;left:50%;transform:translateX(-50%);color:#666;font-size:.75rem;letter-spacing:4px}
.tag{position:absolute;top:95px;left:50%;transform:translateX(-50%);color:#00ff00;font-size:.6rem;letter-spacing:3px;border:1px solid rgba(0,255,0,.3);padding:4px 14px;border-radius:10px;background:rgba(0,255,0,.05)}
.badge{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,255,0,.08);border:1px solid rgba(0,255,0,.3);padding:10px 28px;border-radius:20px;color:#00ff00;font-size:.8rem;letter-spacing:2px}
.pp{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0070ba,#005ea6);color:#fff;padding:14px 40px;border-radius:25px;text-decoration:none;font-size:.85rem;letter-spacing:2px;font-weight:600}
.ss{position:absolute;top:20px;right:20px;background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;padding:6px 14px;border-radius:16px;font-size:.7rem;font-weight:bold}
</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK</div><h1>OMNIGUARD</h1><p class="sub">World's First Agentic AI Cybersecurity | Floor 2</p><div class="tag">AGENT SWARM ACTIVE • SENTINEL WATCHING • FULL AUTOMATION</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">SECURE YOUR EMPIRE — $99/mo</a><div class="badge">FLOOR 2 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,20,80);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.1;
document.getElementById("c").appendChild(r.domElement);
s.add(new THREE.AmbientLight(0x001100,.3));
const g=new THREE.PointLight(0x00ff00,1.5,400);g.position.set(0,50,100);s.add(g);
const b=new THREE.PointLight(0x00ffff,1,400);b.position.set(-80,30,-50);s.add(b);

// Hex grid floor
const hexMat=new THREE.MeshStandardMaterial({color:0x001100,roughness:.2,metalness:.9,emissive:0x00ff00,emissiveIntensity:.1});
for(let x=-15;x<=15;x++)for(let z=-15;z<=15;z++){
  const hex=new THREE.Mesh(new THREE.CylinderGeometry(1,1,.2,6),hexMat);
  hex.position.set(x*2.2+(z%2)*1.1,0,z*1.9);
  s.add(hex);
}

// Digital shield
const shield=new THREE.Group();
const shieldMat=new THREE.MeshPhysicalMaterial({color:0x000,roughness:.2,metalness:.95,emissive:0x00ff00,emissiveIntensity:.3,transmission:.2,thickness:1,clearcoat:1});
const shieldCore=new THREE.Mesh(new THREE.IcosahedronGeometry(18,2),shieldMat);shieldCore.position.y=25;shield.add(shieldCore);
const shieldInner=new THREE.Mesh(new THREE.IcosahedronGeometry(14,1),new THREE.MeshPhysicalMaterial({color:0x000,roughness:.2,metalness:.95,emissive:0x00ffff,emissiveIntensity:.2,wireframe:true,transmission:.3}));shieldInner.position.y=25;shield.add(shieldInner);
for(let i=0;i<6;i++){
  const ring=new THREE.Mesh(new THREE.TorusGeometry(22+i*4,.15,8,64),new THREE.MeshBasicMaterial({color:i%2==0?0x00ff00:0x00ffff}));
  ring.position.y=25;ring.rotation.x=Math.PI/2+i*.15;shield.add(ring);
}
for(let i=0;i<20;i++){
  const sat=new THREE.Mesh(new THREE.SphereGeometry(.4,8,8),new THREE.MeshBasicMaterial({color:0x00ffff}));
  const a=i/20*Math.PI*2;const rad=35+Math.random()*20;
  sat.position.set(Math.cos(a)*rad,25+Math.sin(i)*8,Math.sin(a)*rad);
  shield.add(sat);
}
s.add(shield);

// Matrix rain
const mGeo=new THREE.BufferGeometry(),mCount=4e3,mPos=new Float32Array(mCount*3);
for(let i=0;i<mCount;i++){mPos[i*3]=(Math.random()-.5)*200;mPos[i*3+1]=Math.random()*100;mPos[i*3+2]=(Math.random()-.5)*200;}
mGeo.setAttribute("position",new THREE.BufferAttribute(mPos,3));
const mMat=new THREE.PointsMaterial({size:.6,color:0x00ff00,transparent:true,opacity:.5});
const matrix=new THREE.Points(mGeo,mMat);s.add(matrix);

// Security nodes
const nodes=[];
for(let i=0;i<16;i++){
  const node=new THREE.Mesh(new THREE.SphereGeometry(.6,16,16),new THREE.MeshBasicMaterial({color:0x00ffff}));
  const a=i/16*Math.PI*2;
  nodes.push({mesh:node,r:30+Math.random()*20,a:a,y:10+Math.random()*30});
  s.add(node);
}

let mx=0,my=0,ty=20,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.05;ty=Math.max(10,Math.min(ty,80))});
function a(){requestAnimationFrame(a);t+=.005;
shieldCore.rotation.y+=.008;shieldCore.rotation.x+=.003;shieldInner.rotation.y-=.01;
matrix.rotation.y+=.0005;const mp=matrix.geometry.attributes.position.array;
for(let i=0;i<mCount;i++){mp[i*3+1]-=.3;if(mp[i*3+1]<0)mp[i*3+1]=100;}
matrix.geometry.attributes.position.needsUpdate=true;
nodes.forEach(n=>{n.a+=.005;n.mesh.position.set(Math.cos(n.a)*n.r,n.y+Math.sin(t+n.a)*3,Math.sin(n.a)*n.r)});
c.position.x+=(mx*20-c.position.x)*.02;c.position.y+=(ty-c.position.y)*.05;c.position.z=80+Math.sin(t)*5;c.lookAt(0,25,0);r.render(s,c);
}a();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script></body></html>
