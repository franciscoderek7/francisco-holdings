<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>Vault Velocity Auto | Luxury Brokerage</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#ui *{pointer-events:auto}

</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK</div><h1>VAULT VELOCITY AUTO</h1><p class="sub">Luxury Supercar, Jet & Yacht Brokerage | Floor 4</p><div class="tag">AGENT SWARM ACTIVE • BROKERAGE ONLINE • FULL AUTOMATION</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">ACQUIRE LUXURY — $99K+</a><div class="badge">FLOOR 4 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,15,90);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.2;
document.getElementById("c").appendChild(r.domElement);
s.add(new THREE.AmbientLight(0x1a0000,.4));
const g=new THREE.PointLight(0xff0000,1.5,400);g.position.set(0,50,100);s.add(g);
const b=new THREE.PointLight(0xffd700,1,400);b.position.set(-80,30,-50);s.add(b);

// Showroom floor
const floor=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({color:0x0a0000,roughness:.05,metalness:.95}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;s.add(floor);

// Rotating platform
const platMat=new THREE.MeshStandardMaterial({color:0x111,roughness:.1,metalness:1,emissive:0xff0000,emissiveIntensity:.1});
const plat=new THREE.Mesh(new THREE.CylinderGeometry(25,25,1,64),platMat);
plat.position.y=.5;s.add(plat);

// Luxury car
const car=new THREE.Group();
const bodyMat=new THREE.MeshPhysicalMaterial({color:0x000,roughness:.1,metalness:1,emissive:0xff0000,emissiveIntensity:.2,clearcoat:1,clearcoatRoughness:.05});
const body=new THREE.Mesh(new THREE.BoxGeometry(20,4,8),bodyMat);body.position.y=3;car.add(body);
const cabinMat=new THREE.MeshPhysicalMaterial({color:0x000,roughness:.1,metalness:1,emissive:0xff0000,emissiveIntensity:.1,transmission:.3,thickness:1});
const cabin=new THREE.Mesh(new THREE.BoxGeometry(10,2.5,7),cabinMat);cabin.position.set(-2,6,0);car.add(cabin);
const wheelMat=new THREE.MeshStandardMaterial({color:0x111,metalness:1,roughness:.1});
const wheelFL=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.5,1,16),wheelMat);wheelFL.rotation.z=Math.PI/2;wheelFL.position.set(6,1.5,4);car.add(wheelFL);
const wheelFR=wheelFL.clone();wheelFR.position.set(6,1.5,-4);car.add(wheelFR);
const wheelRL=wheelFL.clone();wheelRL.position.set(-6,1.5,4);car.add(wheelRL);
const wheelRR=wheelFL.clone();wheelRR.position.set(-6,1.5,-4);car.add(wheelRR);
plat.add(car);

// Gold sparks
const spGeo=new THREE.BufferGeometry(),spCount=2e3,spPos=new Float32Array(spCount*3);
for(let i=0;i<spCount;i++){spPos[i*3]=(Math.random()-.5)*200;spPos[i*3+1]=Math.random()*80;spPos[i*3+2]=(Math.random()-.5)*200;}
spGeo.setAttribute("position",new THREE.BufferAttribute(spPos,3));
const spMat=new THREE.PointsMaterial({size:.8,color:0xffd700,transparent:true,opacity:.5});
const sparks=new THREE.Points(spGeo,spMat);s.add(sparks);

let mx=0,my=0,ty=15,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.05;ty=Math.max(10,Math.min(ty,60))});
function a(){requestAnimationFrame(a);t+=.005;
plat.rotation.y+=.003;sparks.rotation.y+=.0003;
c.position.x+=(mx*20-c.position.x)*.02;c.position.y+=(ty-c.position.y)*.05;c.position.z=90+Math.sin(t)*5;c.lookAt(0,5,0);r.render(s,c);
}a();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script></body></html>
