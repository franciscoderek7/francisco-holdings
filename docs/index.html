<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x000000,.002);
const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
camera.position.set(0,30,100);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
document.getElementById("c").appendChild(renderer.domElement);
scene.add(new THREE.AmbientLight(0x001a0a,.4));
const dir=new THREE.DirectionalLight(0x00ff88,.8);dir.position.set(50,100,50);dir.castShadow=true;scene.add(dir);
const spot=new THREE.SpotLight(0xffd700,1.5,300,Math.PI/6,.5,1);spot.position.set(-30,80,30);scene.add(spot);
const floor=new THREE.Mesh(new THREE.PlaneGeometry(500,500),new THREE.MeshStandardMaterial({color:0x080808,roughness:.05,metalness:.95}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);
const tower=new THREE.Group();
const glassMat=new THREE.MeshStandardMaterial({color:0x0a1a0a,roughness:.1,metalness:.9,emissive:0x00ff88,emissiveIntensity:.15,transparent:true,opacity:.9});
const lobbyMat=new THREE.MeshStandardMaterial({color:0x0a1a0a,roughness:.1,metalness:.9,emissive:0x00ff88,emissiveIntensity:.25,transparent:true,opacity:.9});
const goldMat=new THREE.MeshStandardMaterial({color:0xffd700,metalness:1,roughness:0,emissive:0xffd700,emissiveIntensity:.5});
for(let fl=0;fl<39;fl++){
  const y=fl*5+2.5;const isLobby=fl<3;const w=isLobby?26:20;const mat=isLobby?lobbyMat:glassMat;
  const box=new THREE.Mesh(new THREE.BoxGeometry(w,4.8,w),mat);
  box.position.y=y;box.castShadow=true;box.receiveShadow=true;tower.add(box);
  if(!isLobby){
    for(let side=0;side<4;side++){
      const win=new THREE.Mesh(new THREE.PlaneGeometry(w*.7,3.5),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.12}));
      const a=side*Math.PI/2;
      win.position.set(Math.sin(a)*(w/2+.1),y,Math.cos(a)*(w/2+.1));
      win.rotation.y=a+Math.PI;scene.add(win);
    }
  }
  if(fl%10==0&&fl>0){const trim=new THREE.Mesh(new THREE.BoxGeometry(w+.4,.2,w+.4),goldMat);trim.position.y=y+2.5;tower.add(trim);}
}
const arch=new THREE.Group();
const pillarL=new THREE.Mesh(new THREE.BoxGeometry(1.5,10,1.5),goldMat);pillarL.position.set(-8,5,12);arch.add(pillarL);
const pillarR=new THREE.Mesh(new THREE.BoxGeometry(1.5,10,1.5),goldMat);pillarR.position.set(8,5,12);arch.add(pillarR);
const lintel=new THREE.Mesh(new THREE.BoxGeometry(20,1.5,2),goldMat);lintel.position.set(0,11,12);arch.add(lintel);
const glow=new THREE.Mesh(new THREE.PlaneGeometry(14,8),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.25}));
glow.position.set(0,5,13);arch.add(glow);
tower.add(arch);scene.add(tower);
for(let i=0;i<20;i++){
  const h=15+Math.random()*60;
  const bld=new THREE.Mesh(new THREE.BoxGeometry(6+Math.random()*10,h,6+Math.random()*10),new THREE.MeshStandardMaterial({color:0x060606,roughness:.3,metalness:.8}));
  const ang=(i/20)*Math.PI*2;
  bld.position.set(Math.cos(ang)*(150+Math.random()*80),h/2,Math.sin(ang)*(150+Math.random()*80));
  scene.add(bld);
}
const fGeo=new THREE.BufferGeometry(),fCount=2e3,fPos=new Float32Array(fCount*3);
for(let i=0;i<fCount;i++){fPos[i*3]=(Math.random()-.5)*50;fPos[i*3+1]=Math.random()*60;fPos[i*3+2]=(Math.random()-.5)*50;}
fGeo.setAttribute("position",new THREE.BufferAttribute(fPos,3));
const fMat=new THREE.PointsMaterial({size:.7,color:0x00ff88,transparent:true,opacity:.5,blending:THREE.AdditiveBlending});
const fountain=new THREE.Points(fGeo,fMat);scene.add(fountain);
const gGeo=new THREE.BufferGeometry(),gCount=1e3,gPos=new Float32Array(gCount*3);
for(let i=0;i<gCount;i++){gPos[i*3]=(Math.random()-.5)*150;gPos[i*3+1]=Math.random()*100;gPos[i*3+2]=(Math.random()-.5)*150;}
gGeo.setAttribute("position",new THREE.BufferAttribute(gPos,3));
const gMat=new THREE.PointsMaterial({size:.4,color:0xffd700,transparent:true,opacity:.4,blending:THREE.AdditiveBlending});
const goldDust=new THREE.Points(gGeo,gMat);scene.add(goldDust);
const swarm=[];
for(let i=0;i<10;i++){
  const orb=new THREE.Mesh(new THREE.SphereGeometry(.3,12,12),new THREE.MeshBasicMaterial({color:0x00ffff}));
  swarm.push({mesh:orb,angle:i/10*Math.PI*2,radius:12+Math.random()*8,speed:.3+Math.random()*1,y:5+Math.random()*15});
  scene.add(orb);
}
let mx=0,my=0,ty=30,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.08;ty=Math.max(15,Math.min(ty,150))});
function animate(){
  requestAnimationFrame(animate);t+=.005;
  tower.rotation.y=Math.sin(t*.15)*.015;
  fountain.rotation.y+=.0003;
  const fp=fountain.geometry.attributes.position.array;
  for(let i=0;i<fCount;i++){fp[i*3+1]+=.015;if(fp[i*3+1]>60)fp[i*3+1]=0;}
  fountain.geometry.attributes.position.needsUpdate=true;
  goldDust.rotation.y-=.0002;
  swarm.forEach(o=>{o.angle+=o.speed*.008;o.mesh.position.set(Math.cos(o.angle)*o.radius,o.y+Math.sin(t*2+o.angle)*2,Math.sin(o.angle)*o.radius)});
  camera.position.x+=(mx*25-camera.position.x)*.02;
  camera.position.y+=(ty-camera.position.y)*.05;
  camera.position.z=100+Math.sin(t)*3;
  camera.lookAt(0,ty*.4,0);
  renderer.render(scene,camera);
}
animate();
addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script></body></html>
