<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Francisco Holdings Inc - 392 Floor Empire</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#0f0;font-family:'Courier New',monospace;overflow:hidden}#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}.panel{position:fixed;background:rgba(0,0,0,0.85);border:1px solid #0f0;padding:12px;pointer-events:auto}#info{top:20px;left:20px}#info h1{font-size:14px;margin-bottom:4px}#info p{font-size:11px;color:#888}#controls{bottom:20px;right:20px;text-align:right}#controls button{background:#0f0;color:#000;border:none;padding:6px 12px;margin:2px;font-family:inherit;cursor:pointer;font-size:11px}#dash-btn{position:fixed;top:20px;right:20px;background:#0f0;color:#000;border:none;padding:8px 16px;font-family:inherit;cursor:pointer;font-weight:bold}#dashboard{position:fixed;bottom:0;left:0;width:100%;height:40%;background:rgba(0,0,0,0.95);border-top:2px solid #0f0;display:none;z-index:20;padding:16px;overflow-y:auto}#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;z-index:100}</style><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script><script src="core/EventStateManagerV2.js"></script><script src="core/EmpireNervousSystem.js"></script><script src="core/EmpireEdgeConsolidator.js"></script><script src="core/EmpireQueryEngineV2.js"></script><script src="dashboard/EmpireHQDashboardSkeleton.js"></script><script src="render/animation/TransitionEngine.js"></script><script src="render/performance/PerformanceProfile.js"></script><script src="demo/EmpireAscensionDemo.js"></script></head><body><div id="loading">INITIALIZING 392 FLOORS...</div><canvas id="canvas"></canvas><div id="ui"><div id="info" class="panel"><h1>FRANCISCO HOLDINGS INC</h1><p>Floor: <span id="floor-num">1</span> / 392</p><p>Revenue: $<span id="rev">0</span></p><p>Agents: <span id="agents">0</span></p><p>Status: <span id="status">ONLINE</span></p></div><div id="controls" class="panel"><button onclick="prevFloor()">PREV</button><button onclick="nextFloor()">NEXT</button><button onclick="topFloor()">TOP</button><button onclick="lobby()">LOBBY</button></div></div><button id="dash-btn" onclick="toggleDash()">DASHBOARD</button><div id="dashboard"></div><script>
const canvas=document.getElementById('canvas'),scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0,0.002);const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,2e3),renderer=new THREE.WebGLRenderer({canvas,antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));const floors=[],avatars=[],floorGeo=new THREE.BoxGeometry(8,1.8,8),activeMat=new THREE.MeshStandardMaterial({color:65280,emissive:17408,roughness:0.3,metalness:0.8}),inactiveMat=new THREE.MeshStandardMaterial({color:2236962,emissive:4352,roughness:0.7,metalness:0.5}),avatarGeo=new THREE.SphereGeometry(0.4,16,16),avatarMat=new THREE.MeshStandardMaterial({color:16766720,emissive:11141120,emissiveIntensity:0.5});for(let i=0;i<392;i++){const mesh=new THREE.Mesh(floorGeo,i===0?activeMat:inactiveMat.clone());mesh.position.y=i*2.2;mesh.userData={floor:i+1,active:i===0};scene.add(mesh);floors.push(mesh);const av=new THREE.Mesh(avatarGeo,avatarMat.clone());av.position.set((Math.random()-0.5)*4,i*2.2+1.2,(Math.random()-0.5)*4);av.visible=i===0;scene.add(av);avatars.push(av)}const light=new THREE.PointLight(65280,2,100);light.position.set(10,100,10);scene.add(light);const amb=new THREE.AmbientLight(1118481);scene.add(amb);camera.position.set(15,5,25);let currentFloor=1;const raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();function onMove(e){mouse.x=e.clientX/innerWidth*2-1;mouse.y=-(e.clientY/innerHeight)*2+1}function onClick(){raycaster.setFromCamera(mouse,camera);const hits=raycaster.intersectObjects(floors);hits.length>0&&goToFloor(hits[0].object.userData.floor)}addEventListener('mousemove',onMove);addEventListener('click',onClick);addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});function goToFloor(f){if(f<1||f>392)return;currentFloor=f;floors.forEach((m,i)=>{m.material=i+1===f?activeMat:inactiveMat.clone();m.userData.active=i+1===f;avatars[i].visible=i+1===f});document.getElementById('floor-num').textContent=f;window.EmpireEventStateManager&&EmpireEventStateManager.emit('FLOOR_ACTIVATE',{floor:f});gsap.to(camera.position,{y:(f-1)*2.2+8,duration:1.2,ease:'power2.inOut'});gsap.to(camera.lookAt,{y:(f-1)*2.2,duration:1})}function nextFloor(){goToFloor(currentFloor+1)}function prevFloor(){goToFloor(currentFloor-1)}function topFloor(){goToFloor(392)}function lobby(){goToFloor(1)}function toggleDash(){const d=document.getElementById('dashboard');if(d.style.display==='block'){d.style.display='none';return}d.style.display='block';if(window.EmpireHQDashboardSkeleton){d.innerHTML='';const dash=new EmpireHQDashboardSkeleton('dashboard');dash.init()}}function animate(){requestAnimationFrame(animate);avatars.forEach((a,i)=>{a.visible&&(a.position.y+=Math.sin(Date.now()*0.003+i)*0.005,a.rotation.y+=0.02)});renderer.render(scene,camera)}animate();document.getElementById('loading').style.display='none';window.EmpireEventStateManager&&EmpireEventStateManager.init();window.EmpireNervous&&EmpireNervous.init();
</script></body></html>
