<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Francisco Holdings Inc. | Global Empire HQ</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#ui *{pointer-events:auto}
h1{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:2.8rem;font-weight:200;letter-spacing:12px;text-transform:uppercase;background:linear-gradient(135deg,#00ff88,#ffd700,#00ff88);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease infinite;text-shadow:0 0 60px rgba(0,255,136,0.2)}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
p.sub{position:absolute;top:72px;left:50%;transform:translateX(-50%);color:#666;font-size:.75rem;letter-spacing:6px;text-transform:uppercase}
.agent-tag{position:absolute;top:110px;left:50%;transform:translateX(-50%);color:#00ff88;font-size:.65rem;letter-spacing:4px;border:1px solid rgba(0,255,136,.3);padding:4px 16px;border-radius:12px;background:rgba(0,255,136,.05)}
.badge{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border:1px solid rgba(255,215,0,.4);padding:12px 32px;border-radius:30px;color:#ffd700;font-size:.8rem;letter-spacing:3px;backdrop-filter:blur(10px)}
.pp{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0070ba,#005ea6);color:#fff;padding:16px 48px;border-radius:30px;text-decoration:none;font-size:.9rem;letter-spacing:3px;font-weight:600;box-shadow:0 0 40px rgba(0,112,186,.4);transition:all .3s;border:none;cursor:pointer}
.pp:hover{transform:translateX(-50%) scale(1.08);box-shadow:0 0 60px rgba(0,112,186,.7)}
.ss{position:absolute;top:24px;right:24px;background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;padding:8px 18px;border-radius:20px;font-size:.7rem;font-weight:800;letter-spacing:1px;box-shadow:0 0 20px rgba(255,215,0,.3)}
.elevator{position:absolute;bottom:180px;left:50%;transform:translateX(-50%);color:#444;font-size:.6rem;letter-spacing:2px}
</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK VERIFIED</div><h1>Francisco Holdings Inc.</h1><p class="sub">392-Floor Global Empire Command Center</p><div class="agent-tag">AGENT SWARM ACTIVE • OMNI WATCHING • PRIMEDOX ONLINE</div><div class="elevator">ELEVATOR: LOBBY LEVEL</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">ENTER THE EMPIRE — $49</a><div class="badge">FLOOR 1 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.0015);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,5e3);
c.position.set(0,25,120);
const r=new THREE.WebGLRenderer({antialias:true,alpha:true});r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));r.shadowMap.enabled=true;r.shadowMap.type=THREE.PCFSoftShadowMap;document.getElementById("c").appendChild(r.domElement);
const amb=new THREE.AmbientLight(0x001a0a,.4);s.add(amb);
const moon=new THREE.DirectionalLight(0x00ff88,.8);moon.position.set(100,200,100);moon.castShadow=true;moon.shadow.mapSize.width=2048;moon.shadow.mapSize.height=2048;s.add(moon);
const goldSpot=new THREE.SpotLight(0xffd700,2,400,Math.PI/6,.5,1);goldSpot.position.set(-50,150,50);goldSpot.castShadow=true;s.add(goldSpot);
const fill=new THREE.PointLight(0x0088ff,.3,300);fill.position.set(50,30,-50);s.add(fill);
const floorGeo=new THREE.PlaneGeometry(1e3,1e3);
const floorMat=new THREE.MeshStandardMaterial({color:0x050505,roughness:.05,metalness:.95});
const floor=new THREE.Mesh(floorGeo,floorMat);floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;s.add(floor);
const tower=new THREE.Group();
for(let fl=0;fl<39;fl++){
    const y=fl*5+2.5;
    const isLobby=fl<3;
    const w=isLobby?28:22;
    const box=new THREE.Mesh(new THREE.BoxGeometry(w,4.8,w),new THREE.MeshStandardMaterial({
        color:isLobby?0x0a1a0a:0x111111,roughness:.1,metalness:.9,
        emissive:isLobby?0x00ff88:0x001100,emissiveIntensity:isLobby?.2:.05,
        transparent:true,opacity:.9
    }));
    box.position.y=y;box.castShadow=true;box.receiveShadow=true;tower.add(box);
    if(!isLobby){
        for(let side=0;side<4;side++){
            const win=new THREE.Mesh(new THREE.PlaneGeometry(w*.8,3.5),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.15}));
            const a=side*Math.PI/2;
            win.position.set(Math.sin(a)*(w/2+.1),y,Math.cos(a)*(w/2+.1));
            win.rotation.y=a+Math.PI;s.add(win);
        }
    }
    if(fl%10==0&&fl>0){
        const trim=new THREE.Mesh(new THREE.BoxGeometry(w+.5,.3,w+.5),new THREE.MeshStandardMaterial({color:0xffd700,metalness:1,roughness:0,emissive:0xffd700,emissiveIntensity:.6}));
        trim.position.y=y+2.5;tower.add(trim);
    }
}
const arch=new THREE.Group();
const archMat=new THREE.MeshStandardMaterial({color:0xffd700,metalness:1,roughness:0,emissive:0xffd700,emissiveIntensity:.4});
const pillarL=new THREE.Mesh(new THREE.BoxGeometry(2,12,2),archMat);pillarL.position.set(-10,6,14);arch.add(pillarL);
const pillarR=new THREE.Mesh(new THREE.BoxGeometry(2,12,2),archMat);pillarR.position.set(10,6,14);arch.add(pillarR);
const lintel=new THREE.Mesh(new THREE.BoxGeometry(24,2,3),archMat);lintel.position.set(0,13,14);arch.add(lintel);
const doorGlow=new THREE.Mesh(new THREE.PlaneGeometry(18,10),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.3}));
doorGlow.position.set(0,6,15);arch.add(doorGlow);
tower.add(arch);
s.add(tower);
for(let i=0;i<30;i++){
    const h=20+Math.random()*80;
    const bld=new THREE.Mesh(new THREE.BoxGeometry(8+Math.random()*12,h,8+Math.random()*12),new THREE.MeshStandardMaterial({color:0x080808,roughness:.3,metalness:.8}));
    const ang=(i/30)*Math.PI*2;
    bld.position.set(Math.cos(ang)*(200+Math.random()*100),h/2,Math.sin(ang)*(200+Math.random()*100));
    s.add(bld);
}
const fGeo=new THREE.BufferGeometry(),fCount=3e3,fPos=new Float32Array(fCount*3);
for(let i=0;i<fCount;i++){
    fPos[i*3]=(Math.random()-.5)*60;
    fPos[i*3+1]=Math.random()*80;
    fPos[i*3+2]=(Math.random()-.5)*60;
}
fGeo.setAttribute("position",new THREE.BufferAttribute(fPos,3));
const fMat=new THREE.PointsMaterial({size:.8,color:0x00ff88,transparent:true,opacity:.6,blending:THREE.AdditiveBlending});
const fountain=new THREE.Points(fGeo,fMat);s.add(fountain);
const gGeo=new THREE.BufferGeometry(),gCount=1500,gPos=new Float32Array(gCount*3);
for(let i=0;i<gCount;i++){
    gPos[i*3]=(Math.random()-.5)*200;
    gPos[i*3+1]=Math.random()*150;
    gPos[i*3+2]=(Math.random()-.5)*200;
}
gGeo.setAttribute("position",new THREE.BufferAttribute(gPos,3));
const gMat=new THREE.PointsMaterial({size:.5,color:0xffd700,transparent:true,opacity:.4,blending:THREE.AdditiveBlending});
const goldDust=new THREE.Points(gGeo,gMat);s.add(goldDust);
const swarm=[];
for(let i=0;i<12;i++){
    const orb=new THREE.Mesh(new THREE.SphereGeometry(.4,16,16),new THREE.MeshBasicMaterial({color:0x00ffff}));
    swarm.push({mesh:orb,angle:i/12*Math.PI*2,radius:15+Math.random()*10,speed:.5+Math.random()*1,y:5+Math.random()*20});
    s.add(orb);
}
let mx=0,my=0,ty=25,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.08;ty=Math.max(15,Math.min(ty,200))});
function animate(){
    requestAnimationFrame(animate);t+=.005;
    tower.rotation.y=Math.sin(t*.2)*.02;
    fountain.rotation.y+=.0003;
    goldDust.rotation.y-=.0002;
    const fp=fountain.geometry.attributes.position.array;
    for(let i=0;i<fCount;i++){fp[i*3+1]+=.02;if(fp[i*3+1]>80)fp[i*3+1]=0;}
    fountain.geometry.attributes.position.needsUpdate=true;
    swarm.forEach(o=>{o.angle+=o.speed*.01;o.mesh.position.set(Math.cos(o.angle)*o.radius,o.y+Math.sin(t*2+o.angle)*2,Math.sin(o.angle)*o.radius)});
    c.position.x+=(mx*30-c.position.x)*.02;
    c.position.y+=(ty-c.position.y)*.05;
    c.position.z=120+Math.sin(t)*3;
    c.lookAt(0,ty*.5,0);
    r.render(s,c);
}
animate();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
gsap.from("h1",{y:60,opacity:0,duration:2,ease:"power3.out",delay:.3});
gsap.from(".pp",{scale:0,opacity:0,duration:1,delay:1.2,ease:"back.out(1.7)"});
</script></body></html>
