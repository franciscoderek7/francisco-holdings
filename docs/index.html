<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Francisco Holdings Inc.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #d4af37; font-family: 'Georgia', serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
    h1 { font-size: 3rem; margin-bottom: 1rem; text-shadow: 0 0 30px rgba(212,175,55,0.5); }
    p { color: #00d4ff; font-size: 1.2rem; }
    .loading { width: 50px; height: 50px; border: 3px solid #d4af37; border-top: 3px solid #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin-top: 2rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>Francisco Holdings Inc.</h1>
  <p>392-Floor Empire Loading...</p>
  <div class="loading"></div>
  <script type="module" src="./three-app.js"></script>
</body>
</html>
