<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Francisco Holdings — Empire Core</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #05070a; color: #00ff88; }
    #boot { padding: 20px; font-size: 14px; white-space: pre-wrap; }
    .ok { color: #00ff88; }
    .fail { color: #ff3b3b; }
    .warn { color: #ffcc00; }
    #dashboard { display: none; padding: 20px; }
    .panel { border: 1px solid #00ff88; padding: 10px; margin: 10px 0; }
    button { padding: 10px; margin: 5px; background: #111; color: #00ff88; border: 1px solid #00ff88; cursor: pointer; }
    button:hover { background: #00ff88; color: #000; }
  </style>
</head>
<body>
<div id="boot">BOOTING EMPIRE...\n</div>
<div id="dashboard">
  <h1>EMPIRE COMMAND CENTER</h1>
  <div class="panel">
    <h3>FLOORS</h3>
    <button onclick="go('dashboard')">CEO DASHBOARD (PIN 3921)</button>
    <button onclick="go('omniaguard')">OmniGuard</button>
    <button onclick="go('primedox')">PrimeDox</button>
    <button onclick="go('ccldr')">CCLDR</button>
    <button onclick="go('techpetcage')">TechPetCage</button>
    <button onclick="go('vaultvelocity')">Vault Velocity</button>
    <button onclick="go('vigilax')">Vigilax</button>
    <button onclick="go('cleanswarm')">CleanSwarm</button>
    <button onclick="go('kiaros')">Kiaros</button>
  </div>
  <div class="panel">
    <h3>3D STATUS</h3>
    <div id="threeStatus">checking...</div>
  </div>
  <div class="panel">
    <h3>MODULE STATUS</h3>
    <div id="moduleStatus"></div>
  </div>
</div>
<script>
const bootLog = document.getElementById("boot");
function log(msg, cls="ok") { bootLog.innerHTML += `<span class="${cls}">${msg}</span>\n`; }
function checkModule(name, testFn) { try { const ok = testFn(); log(`${name}: ${ok ? "OK" : "FAIL"}`, ok ? "ok" : "fail"); return ok; } catch (e) { log(`${name}: ERROR`, "fail"); return false; } }
function loadScript(src) { return new Promise((resolve) => { const s = document.createElement("script"); s.src = src; s.onload = () => resolve(true); s.onerror = () => resolve(false); document.head.appendChild(s); }); }
async function boot() {
  log("Loading core systems...");
  const core = await loadScript("./core/EventStateManagerV2.js");
  const dash = await loadScript("./dashboard/EmpireHQDashboardSkeleton.js");
  const audio = await loadScript("./audio/EmpireAudioSystem.js");
  const camera = await loadScript("./camera/EmpireCameraSystem.js");
  log("Verifying runtime objects...");
  checkModule("EventStateManager", () => typeof window.EventStateManagerV2 !== "undefined");
  checkModule("Dashboard", () => typeof window.EmpireHQDashboardSkeleton !== "undefined");
  checkModule("Audio", () => typeof window.EmpireAudioSystem !== "undefined");
  checkModule("Camera", () => typeof window.EmpireCameraSystem !== "undefined");
  log("ACCESS GRANTED", "ok");
  bootLog.style.display = "none";
  document.getElementById("dashboard").style.display = "block";
  const threeWorking = !!window.THREE;
  document.getElementById("threeStatus").innerText = threeWorking ? "THREE.JS LOADED" : "THREE.JS NOT DETECTED";
}
function go(path) { window.location.href = "/" + path + "/"; }
boot();
</script>
</body>
</html>
