<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Francisco Holdings Inc. | Global Empire HQ</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
#ui *{pointer-events:auto}
h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2.8rem;font-weight:200;letter-spacing:12px;text-transform:uppercase;background:linear-gradient(135deg,#00ff88,#ffd700,#00ff88);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s ease infinite}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
p.sub{position:absolute;top:72px;left:50%;transform:translateX(-50%);color:#888;font-size:.75rem;letter-spacing:6px;text-transform:uppercase}
.agent-tag{position:absolute;top:110px;left:50%;transform:translateX(-50%);color:#00ff88;font-size:.65rem;letter-spacing:4px;border:1px solid rgba(0,255,136,.3);padding:4px 16px;border-radius:12px;background:rgba(0,255,136,.05)}
.badge{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);border:1px solid rgba(255,215,0,.4);padding:12px 32px;border-radius:30px;color:#ffd700;font-size:.8rem;letter-spacing:3px;backdrop-filter:blur(10px)}
.pp{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0070ba,#005ea6);color:#fff;padding:16px 48px;border-radius:30px;text-decoration:none;font-size:.9rem;letter-spacing:3px;font-weight:600;box-shadow:0 0 40px rgba(0,112,186,.4);transition:all .3s;border:none;cursor:pointer}
.pp:hover{transform:translateX(-50%) scale(1.08);box-shadow:0 0 60px rgba(0,112,186,.7)}
.ss{position:absolute;top:20px;right:20px;background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;padding:8px 18px;border-radius:20px;font-size:.7rem;font-weight:800;letter-spacing:1px;box-shadow:0 0 20px rgba(255,215,0,.3)}
.nav{position:absolute;bottom:180px;left:50%;transform:translateX(-50%);display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:90%}
.nav a{color:#888;text-decoration:none;font-size:.6rem;letter-spacing:2px;border:1px solid #333;padding:4px 10px;border-radius:8px;transition:all .3s}
.nav a:hover{color:#00ff88;border-color:#00ff88}
</style></head>
<body>
<div id="c"></div>
<div id="ui">
<div class="ss">SOULSTACK VERIFIED</div>
<h1>Francisco Holdings Inc.</h1>
<p class="sub">392-Floor Global Empire Command Center</p>
<div class="agent-tag">AGENT SWARM ACTIVE • OMNI WATCHING • PRIMEDOX ONLINE</div>
<div class="nav">
<a href="omniaguard/">F2</a><a href="primedox/">F3</a><a href="vaultvelocityauto/">F4</a><a href="techpetcage/">F5</a>
<a href="ccldr/">F6</a><a href="weedlaw/">F7</a><a href="beno-x/">F8</a><a href="cleanswarm/">F9</a>
<a href="kiaros/">F10</a><a href="vigilax/">F11</a><a href="techpackcage/">F12</a>
</div>
<a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">ENTER THE EMPIRE — $49</a>
<div class="badge">FLOOR 1 OF 392</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,.001);

const camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,5e3);
camera.position.set(40,35,120);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;
document.getElementById("c").appendChild(renderer.domElement);

// Premium lighting
const amb=new THREE.AmbientLight(0x001a0a,.3);
scene.add(amb);
const hemi=new THREE.HemisphereLight(0x00ff88,0x000000,.4);
scene.add(hemi);
const moon=new THREE.DirectionalLight(0x00ff88,1.2);
moon.position.set(80,200,60);
moon.castShadow=true;
moon.shadow.mapSize.width=2048;
moon.shadow.mapSize.height=2048;
moon.shadow.camera.near=1;
moon.shadow.camera.far=500;
moon.shadow.camera.left=-100;
moon.shadow.camera.right=100;
moon.shadow.camera.top=100;
moon.shadow.camera.bottom=-100;
scene.add(moon);
const goldLight=new THREE.PointLight(0xffd700,2,300);
goldLight.position.set(-40,80,40);
scene.add(goldLight);
const rimLight=new THREE.SpotLight(0x0088ff,1.5,400,Math.PI/6,.5,1);
rimLight.position.set(60,100,-40);
scene.add(rimLight);

// Reflective marble floor
const floorGeo=new THREE.PlaneGeometry(1e3,1e3);
const floorMat=new THREE.MeshStandardMaterial({
  color:0x0a0a0a,
  roughness:.02,
  metalness:.98,
  envMapIntensity:1
});
const floor=new THREE.Mesh(floorGeo,floorMat);
floor.rotation.x=-Math.PI/2;
floor.receiveShadow=true;
scene.add(floor);

// Environment map for reflections (procedural cube)
const cubeRenderTarget=new THREE.WebGLCubeRenderTarget(256);
const cubeCamera=new THREE.CubeCamera(.1,1e3,cubeRenderTarget);
scene.add(cubeCamera);

// Skyscraper group
const tower=new THREE.Group();

// Main shaft - realistic glass
const glassMat=new THREE.MeshPhysicalMaterial({
  color:0x050505,
  roughness:.05,
  metalness:.9,
  transmission:.3,
  thickness:2,
  transparent:true,
  opacity:.85,
  envMapIntensity:2,
  clearcoat:1,
  clearcoatRoughness:.1
});

const lobbyGlass=new THREE.MeshPhysicalMaterial({
  color:0x0a1a0a,
  roughness:.05,
  metalness:.9,
  transmission:.4,
  thickness:3,
  transparent:true,
  opacity:.9,
  emissive:0x00ff88,
  emissiveIntensity:.15,
  envMapIntensity:2,
  clearcoat:1
});

const goldTrimMat=new THREE.MeshStandardMaterial({
  color:0xffd700,
  roughness:.1,
  metalness:1,
  emissive:0xffd700,
  emissiveIntensity:.4
});

// Build floors
for(let fl=0;fl<39;fl++){
  const y=fl*5+2.5;
  const isLobby=fl<3;
  const w=isLobby?28:22;
  const mat=isLobby?lobbyGlass:glassMat;
  
  const box=new THREE.Mesh(new THREE.BoxGeometry(w,4.8,w),mat);
  box.position.y=y;
  box.castShadow=true;
  box.receiveShadow=true;
  tower.add(box);
  
  // Window strips with emission
  if(!isLobby){
    for(let side=0;side<4;side++){
      const winGeo=new THREE.PlaneGeometry(w*.75,3.8);
      const winMat=new THREE.MeshBasicMaterial({
        color:0x00ff88,
        transparent:true,
        opacity:.08,
        blending:THREE.AdditiveBlending
      });
      const win=new THREE.Mesh(winGeo,winMat);
      const a=side*Math.PI/2;
      win.position.set(Math.sin(a)*(w/2+.05),y,Math.cos(a)*(w/2+.05));
      win.rotation.y=a+Math.PI;
      tower.add(win);
    }
  }
  
  // Gold trim every 10 floors
  if(fl%10==0&&fl>0){
    const trim=new THREE.Mesh(new THREE.BoxGeometry(w+.6,.4,w+.6),goldTrimMat);
    trim.position.y=y+2.5;
    tower.add(trim);
  }
}

// Grand lobby entrance
const lobby=new THREE.Group();
const lobbyFloor=new THREE.Mesh(new THREE.BoxGeometry(32,.5,32),new THREE.MeshStandardMaterial({color:0x111,roughness:.1,metalness:.9}));
lobbyFloor.position.y=.25;lobby.add(lobbyFloor);

// Gold pillars
const pillarGeo=new THREE.CylinderGeometry(1.2,1.5,14,16);
for(let i=0;i<4;i++){
  const a=(i/4)*Math.PI*2;
  const pillar=new THREE.Mesh(pillarGeo,goldTrimMat);
  pillar.position.set(Math.cos(a)*12,7,Math.sin(a)*12);
  pillar.castShadow=true;
  lobby.add(pillar);
}

// Lobby ceiling
const ceil=new THREE.Mesh(new THREE.BoxGeometry(30,.3,30),goldTrimMat);
ceil.position.y=14;lobby.add(ceil);

// Entrance arch
const archGlow=new THREE.Mesh(new THREE.PlaneGeometry(16,10),new THREE.MeshBasicMaterial({
  color:0x00ff88,
  transparent:true,
  opacity:.2,
  blending:THREE.AdditiveBlending
}));
archGlow.position.set(0,5,16);lobby.add(archGlow);

// Entrance frame
const frameTop=new THREE.Mesh(new THREE.BoxGeometry(18,1,1),goldTrimMat);
frameTop.position.set(0,10.5,16);lobby.add(frameTop);
const frameL=new THREE.Mesh(new THREE.BoxGeometry(1,10,1),goldTrimMat);
frameL.position.set(-8.5,5,16);lobby.add(frameL);
const frameR=new THREE.Mesh(new THREE.BoxGeometry(1,10,1),goldTrimMat);
frameR.position.set(8.5,5,16);lobby.add(frameR);

tower.add(lobby);
scene.add(tower);

// City skyline background
const cityGroup=new THREE.Group();
for(let i=0;i<40;i++){
  const h=25+Math.random()*100;
  const w=8+Math.random()*15;
  const d=8+Math.random()*15;
  const bldMat=new THREE.MeshStandardMaterial({
    color:0x080808,
    roughness:.3,
    metalness:.8,
    emissive:0x001100,
    emissiveIntensity:.05
  });
  const bld=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),bldMat);
  const ang=(i/40)*Math.PI*2;
  const dist=180+Math.random()*120;
  bld.position.set(Math.cos(ang)*dist,h/2,Math.sin(ang)*dist);
  bld.castShadow=true;
  cityGroup.add(bld);
  
  // Building lights
  if(i%3==0){
    const light=new THREE.PointLight(0x00ff88,.3,50);
    light.position.set(Math.cos(ang)*dist,h,Math.sin(ang)*dist);
    cityGroup.add(light);
  }
}
scene.add(cityGroup);

// Emerald fountain particles
const fGeo=new THREE.BufferGeometry();
const fCount=3e3;
const fPos=new Float32Array(fCount*3);
const fVel=new Float32Array(fCount);
for(let i=0;i<fCount;i++){
  fPos[i*3]=(Math.random()-.5)*80;
  fPos[i*3+1]=Math.random()*100;
  fPos[i*3+2]=(Math.random()-.5)*80;
  fVel[i]=.2+Math.random()*.8;
}
fGeo.setAttribute("position",new THREE.BufferAttribute(fPos,3));
const fMat=new THREE.PointsMaterial({
  size:.8,
  color:0x00ff88,
  transparent:true,
  opacity:.5,
  blending:THREE.AdditiveBlending
});
const fountain=new THREE.Points(fGeo,fMat);
scene.add(fountain);

// Gold dust
const gGeo=new THREE.BufferGeometry();
const gCount=2e3;
const gPos=new Float32Array(gCount*3);
for(let i=0;i<gCount;i++){
  gPos[i*3]=(Math.random()-.5)*250;
  gPos[i*3+1]=Math.random()*150;
  gPos[i*3+2]=(Math.random()-.5)*250;
}
gGeo.setAttribute("position",new THREE.BufferAttribute(gPos,3));
const gMat=new THREE.PointsMaterial({
  size:.5,
  color:0xffd700,
  transparent:true,
  opacity:.35,
  blending:THREE.AdditiveBlending
});
const goldDust=new THREE.Points(gGeo,gMat);
scene.add(goldDust);

// Agent swarm orbs
const swarm=[];
const orbGeo=new THREE.SphereGeometry(.5,16,16);
const orbMat=new THREE.MeshBasicMaterial({color:0x00ffff});
for(let i=0;i<12;i++){
  const orb=new THREE.Mesh(orbGeo,orbMat);
  const trailGeo=new THREE.BufferGeometry();
  const trailCount=20;
  const trailPos=new Float32Array(trailCount*3);
  trailGeo.setAttribute("position",new THREE.BufferAttribute(trailPos,3));
  const trailMat=new THREE.PointsMaterial({
    size:.3,
    color:0x00ffff,
    transparent:true,
    opacity:.6,
    blending:THREE.AdditiveBlending
  });
  const trail=new THREE.Points(trailGeo,trailMat);
  scene.add(trail);
  swarm.push({
    mesh:orb,
    trail:trail,
    trailPos:trailPos,
    angle:i/12*Math.PI*2,
    radius:15+Math.random()*12,
    speed:.4+Math.random()*1.2,
    y:8+Math.random()*25,
    trailIndex:0
  });
  scene.add(orb);
}

// Starfield
const sGeo=new THREE.BufferGeometry();
const sCount=5e3;
const sPos=new Float32Array(sCount*3);
for(let i=0;i<sCount;i++){
  sPos[i*3]=(Math.random()-.5)*2e3;
  sPos[i*3+1]=Math.random()*800;
  sPos[i*3+2]=(Math.random()-.5)*2e3;
}
sGeo.setAttribute("position",new THREE.BufferAttribute(sPos,3));
const sMat=new THREE.PointsMaterial({
  size:.6,
  color:0xffffff,
  transparent:true,
  opacity:.6
});
const stars=new THREE.Points(sGeo,sMat);
scene.add(stars);

// Update environment map
cubeCamera.position.set(0,20,0);
cubeCamera.update(renderer,scene);
floorMat.envMap=cubeRenderTarget.texture;

let mouseX=0,mouseY=0,targetY=35,time=0;
document.addEventListener("mousemove",e=>{
  mouseX=(e.clientX/innerWidth)*2-1;
  mouseY=(e.clientY/innerHeight)*2-1;
});
addEventListener("wheel",e=>{
  targetY+=e.deltaY*.1;
  targetY=Math.max(15,Math.min(targetY,200));
});

function animate(){
  requestAnimationFrame(animate);
  time+=.005;
  
  tower.rotation.y=Math.sin(time*.1)*.008;
  cityGroup.rotation.y=Math.sin(time*.02)*.002;
  
  // Fountain animation
  fountain.rotation.y+=.0002;
  const fp=fountain.geometry.attributes.position.array;
  for(let i=0;i<fCount;i++){
    fp[i*3+1]+=fVel[i]*.01;
    if(fp[i*3+1]>100){
      fp[i*3+1]=0;
      fp[i*3]=(Math.random()-.5)*80;
      fp[i*3+2]=(Math.random()-.5)*80;
    }
  }
  fountain.geometry.attributes.position.needsUpdate=true;
  
  goldDust.rotation.y-=.0001;
  
  // Swarm animation with trails
  swarm.forEach(o=>{
    o.angle+=o.speed*.008;
    const x=Math.cos(o.angle)*o.radius;
    const z=Math.sin(o.angle)*o.radius;
    const y=o.y+Math.sin(time*2+o.angle)*3;
    o.mesh.position.set(x,y,z);
    
    // Update trail
    const tp=o.trailPos;
    for(let i=o.trailCount-1;i>0;i--){
      tp[i*3]=tp[(i-1)*3];
      tp[i*3+1]=tp[(i-1)*3+1];
      tp[i*3+2]=tp[(i-1)*3+2];
    }
    tp[0]=x;tp[1]=y;tp[2]=z;
    o.trail.geometry.attributes.position.needsUpdate=true;
  });
  
  // Camera
  camera.position.x+=(mouseX*30-camera.position.x)*.015;
  camera.position.y+=(targetY-camera.position.y)*.03;
  camera.position.z=120+Math.sin(time*.3)*5;
  camera.lookAt(0,targetY*.3,0);
  
  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script></body></html>
