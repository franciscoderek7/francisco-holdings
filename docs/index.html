<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Francisco Holdings Inc — 392 Floor Empire</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;color:#d4af37;font-family:'Courier New',monospace;overflow:hidden}#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#header{position:fixed;top:12px;left:12px;z-index:20}#header h1{font-size:16px;letter-spacing:2px;color:#d4af37}#header p{font-size:11px;color:#888}#revenue{position:fixed;top:12px;right:12px;text-align:right;z-index:20}#revenue .amt{font-size:22px;color:#0f0;font-weight:bold}#revenue p{font-size:10px;color:#666}#floor-info{position:fixed;bottom:12px;left:12px;background:rgba(0,0,0,0.9);border:1px solid #d4af37;padding:10px;max-width:200px;z-index:20;pointer-events:auto;display:none}#floor-info h3{font-size:13px;margin-bottom:4px;color:#d4af37}#floor-info p{font-size:11px;color:#aaa;margin-bottom:6px}#floor-info .paypal-btn{background:#0f0;color:#000;border:none;padding:6px 12px;font-family:inherit;font-weight:bold;cursor:pointer;font-size:11px;width:100%;margin-top:4px}#nav{position:fixed;bottom:12px;right:12px;display:flex;gap:6px;z-index:20;pointer-events:auto}#nav button{background:#1a1a1a;border:1px solid #d4af37;color:#d4af37;padding:8px 12px;font-family:inherit;cursor:pointer;font-size:11px}#nav button:hover{background:#d4af37;color:#000}#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.95);z-index:100;display:none;flex-direction:column;padding:20px;overflow-y:auto;pointer-events:auto}#overlay .close{position:fixed;top:12px;right:12px;background:#d4af37;color:#000;border:none;padding:8px 16px;font-family:inherit;font-weight:bold;cursor:pointer;z-index:101}#overlay-content{max-width:900px;margin:0 auto;width:100%;padding-top:40px}#overlay-content h2{color:#d4af37;font-size:20px;margin-bottom:12px}#overlay-content .card{background:rgba(255,255,255,0.05);border:1px solid #d4af37;padding:16px;margin:12px 0;border-radius:8px}#overlay-content input,#overlay-content textarea{width:100%;padding:10px;margin:8px 0;background:#111;border:1px solid #333;color:#fff;font-family:inherit}#overlay-content button{background:#d4af37;color:#000;border:none;padding:10px 20px;font-family:inherit;font-weight:bold;cursor:pointer;margin:4px 0}#overlay-content .price{font-size:28px;color:#0f0;font-weight:bold}#loading{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:200;font-size:18px}@media(max-width:768px){#header h1{font-size:13px}#revenue .amt{font-size:18px}#floor-info{max-width:150px;font-size:10px}}</style><script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script></head><body><div id="loading">INITIALIZING 392 FLOORS...</div><canvas id="canvas"></canvas><div id="ui"><div id="header"><h1>FRANCISCO HOLDINGS INC</h1><p>392-Floor Empire | 45+ Companies</p></div><div id="revenue"><div class="amt" id="rev-amt">$0.00</div><p>TOTAL REVENUE</p></div><div id="floor-info"><h3 id="fi-name">Floor 1</h3><p id="fi-desc">HQ</p><button class="paypal-btn" onclick="openFloor()">ENTER FLOOR</button></div><div id="nav"><button onclick="goFloor(1)">LOBBY</button><button onclick="prevFloor()">PREV</button><button onclick="nextFloor()">NEXT</button></div></div><div id="overlay"><button class="close" onclick="closeOverlay()">CLOSE</button><div id="overlay-content"></div></div><script>
const FLOORS=[{id:1,name:"Francisco Holdings HQ",desc:"Empire Command Center",theme:"#d4af37",price:0,companies:["OmniGuard","PrimeDox","TechPetCage"]},{id:2,name:"OmniGuard",desc:"Cybersecurity & Threat Intelligence",theme:"#00ffff",price:99,type:"cyber"},{id:3,name:"PrimeDox AI",desc:"AI Document & Legal Intelligence",theme:"#00ff88",price:49,type:"ai"},{id:4,name:"CCLDR",desc:"Legal Document Generator",theme:"#228b22",price:99,type:"legal"},{id:5,name:"TechPetCage",desc:"Device Protection Plans",theme:"#ff6600",price:49,type:"tech"},{id:6,name:"Vault Velocity",desc:"Luxury Vehicle Brokerage",theme:"#c0c0c0",price:999,type:"luxury"},{id:7,name:"Kiaros",desc:"AI Technology Solutions",theme:"#9400d3",price:99,type:"tech"},{id:8,name:"CleanSwarm",desc:"AI-Powered Cleaning Services",theme:"#00ced1",price:49,type:"service"},{id:9,name:"Neural Graph",desc:"Memory & Knowledge Architecture",theme:"#ff1493",price:199,type:"ai"},{id:10,name:"SoulStack",desc:"Achievement & Badge System",theme:"#ffd700",price:0,type:"system"}];
let scene,camera,renderer,floorMeshes=[],currentFloor=1,raycaster=new THREE.Raycaster(),mouse=new THREE.Vector2();
function init(){const cvs=document.getElementById('canvas');scene=new THREE.Scene();scene.fog=new THREE.Fog(0,0.002);camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1e3);renderer=new THREE.WebGLRenderer({canvas:cvs,antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));const amb=new THREE.AmbientLight(404040);scene.add(amb);const pt=new THREE.PointLight(16766720,2,200);pt.position.set(20,100,20);scene.add(pt);const geo=new THREE.BoxGeometry(10,1.5,10);FLOORS.forEach((f,i)=>{const mat=new THREE.MeshStandardMaterial({color:parseInt(f.theme.replace('#',''),16),emissive:parseInt(f.theme.replace('#',''),16),emissiveIntensity:0.2,metalness:0.6,roughness:0.4});const mesh=new THREE.Mesh(geo,mat);mesh.position.y=i*3;mesh.userData=f;scene.add(mesh);floorMeshes.push(mesh);const label=makeLabel(f.name,i*3);scene.add(label)});camera.position.set(18,8,28);camera.lookAt(0,0,0);document.getElementById('loading').style.display='none';animate();window.addEventListener('resize',onResize);window.addEventListener('mousemove',onMouseMove);window.addEventListener('click',onClick);updateUI()}
function makeLabel(text,y){const canvas=document.createElement('canvas');canvas.width=512;canvas.height=64;const ctx=canvas.getContext('2d');ctx.fillStyle='#000';ctx.fillRect(0,0,512,64);ctx.fillStyle='#d4af37';ctx.font='bold 24px Arial';ctx.textAlign='center';ctx.fillText(text,256,40);const tex=new THREE.CanvasTexture(canvas);const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true});const mesh=new THREE.Mesh(new THREE.PlaneGeometry(8,1),mat);mesh.position.set(0,y+1.2,5.1);return mesh}
function onResize(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)}
function onMouseMove(e){mouse.x=e.clientX/innerWidth*2-1;mouse.y=-(e.clientY/innerHeight)*2+1}
function onClick(){raycaster.setFromCamera(mouse,camera);const hits=raycaster.intersectObjects(floorMeshes);if(hits.length>0){const f=hits[0].object.userData;selectFloor(f.id)}}
function selectFloor(id){currentFloor=id;const f=FLOORS[id-1];document.getElementById('fi-name').textContent='Floor '+id+': '+f.name;document.getElementById('fi-desc').textContent=f.desc;document.getElementById('floor-info').style.display='block';gsap.to(camera.position,{x:15,y:(id-1)*3+6,z:20,duration:1.2,ease:'power2.inOut'});if(window.EmpireEventStateManager)EmpireEventStateManager.emit('FLOOR_ACTIVATE',{floor:id})}
function goFloor(id){selectFloor(id)}
function nextFloor(){if(currentFloor<10)selectFloor(currentFloor+1)}
function prevFloor(){if(currentFloor>1)selectFloor(currentFloor-1)}
function updateUI(){const rev=localStorage.getItem('empire_revenue')||'0';document.getElementById('rev-amt').textContent='$'+parseFloat(rev).toFixed(2)}
function openFloor(){const f=FLOORS[currentFloor-1];const el=document.getElementById('overlay-content');el.innerHTML='';if(f.type==='legal'){el.innerHTML=renderCCLDR(f)}else if(f.type==='cyber'){el.innerHTML=renderOmniGuard(f)}else if(f.type==='ai'){el.innerHTML=renderPrimeDox(f)}else{el.innerHTML=renderGeneric(f)}document.getElementById('overlay').style.display='flex'}
function closeOverlay(){document.getElementById('overlay').style.display='none'}
function renderGeneric(f){return'<h2>'+f.name+'</h2><div class="card"><p>'+f.desc+'</p><div class="price">$'+f.price+'/month</div><form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top"><input type="hidden" name="cmd" value="_xclick-subscriptions"><input type="hidden" name="business" value="YOUR_PAYPAL_BUSINESS_EMAIL"><input type="hidden" name="item_name" value="'+f.name+' Subscription"><input type="hidden" name="a3" value="'+f.price+'"><input type="hidden" name="p3" value="1"><input type="hidden" name="t3" value="M"><input type="hidden" name="src" value="1"><input type="hidden" name="currency_code" value="USD"><button type="submit">SUBSCRIBE $'+f.price+'/MONTH</button></form></div>'}
function renderCCLDR(f){return'<h2>CCLDR — Legal Document Generator</h2><div class="card"><h3>Statement of Claim</h3><textarea id="c-claim" rows="4" placeholder="Enter claim details..."></textarea><button onclick="genPDF(\'claim\')">Generate PDF</button></div><div class="card"><h3>Notice of Motion</h3><textarea id="c-motion" rows="4" placeholder="Enter motion details..."></textarea><button onclick="genPDF(\'motion\')">Generate PDF</button></div><div class="card"><h3>Demand Letter</h3><textarea id="c-demand" rows="4" placeholder="Enter demand details..."></textarea><button onclick="genPDF(\'demand\')">Generate PDF</button></div><div class="card"><h3>Attorney General Reply</h3><textarea id="c-reply" rows="4" placeholder="Enter reply details..."></textarea><button onclick="genPDF(\'reply\')">Generate PDF</button></div><div class="card"><div class="price">$'+f.price+'/month</div><form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top"><input type="hidden" name="cmd" value="_xclick-subscriptions"><input type="hidden" name="business" value="YOUR_PAYPAL_BUSINESS_EMAIL"><input type="hidden" name="item_name" value="CCLDR Legal Generator"><input type="hidden" name="a3" value="99"><input type="hidden" name="p3" value="1"><input type="hidden" name="t3" value="M"><input type="hidden" name="src" value="1"><input type="hidden" name="currency_code" value="USD"><button type="submit">SUBSCRIBE $99/MONTH</button></form></div>'}
function renderOmniGuard(f){return'<h2>OmniGuard — Cybersecurity</h2><div class="card"><input type="text" id="og-url" placeholder="Enter URL to scan..."><button onclick="scanUrl()">SCAN NOW</button><div id="og-result"></div></div><div class="card"><div class="price">$'+f.price+'/month</div><form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top"><input type="hidden" name="cmd" value="_xclick-subscriptions"><input type="hidden" name="business" value="YOUR_PAYPAL_BUSINESS_EMAIL"><input type="hidden" name="item_name" value="OmniGuard Cybersecurity"><input type="hidden" name="a3" value="99"><input type="hidden" name="p3" value="1"><input type="hidden" name="t3" value="M"><input type="hidden" name="src" value="1"><input type="hidden" name="currency_code" value="USD"><button type="submit">SUBSCRIBE $99/MONTH</button></form></div>'}
function renderPrimeDox(f){return'<h2>PrimeDox AI — Document Intelligence</h2><div class="card"><p>AI-powered legal document analysis and generation.</p><button onclick="routeTo(\'ccldr\')">GO TO CCLDR</button><button onclick="routeTo(\'omniaguard\')">GO TO OMNIGUARD</button></div><div class="card"><div class="price">$'+f.price+'/month</div><form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_top"><input type="hidden" name="cmd" value="_xclick-subscriptions"><input type="hidden" name="business" value="YOUR_PAYPAL_BUSINESS_EMAIL"><input type="hidden" name="item_name" value="PrimeDox AI"><input type="hidden" name="a3" value="49"><input type="hidden" name="p3" value="1"><input type="hidden" name="t3" value="M"><input type="hidden" name="src" value="1"><input type="hidden" name="currency_code" value="USD"><button type="submit">SUBSCRIBE $49/MONTH</button></form></div>'}
function genPDF(type){const{jsPDF}=window.jspdf;const doc=new jsPDF();let t='';if(type==='claim')t=document.getElementById('c-claim').value;if(type==='motion')t=document.getElementById('c-motion').value;if(type==='demand')t=document.getElementById('c-demand').value;if(type==='reply')t=document.getElementById('c-reply').value;doc.setFontSize(12);doc.text(t||'EMPTY DOCUMENT',10,10);doc.save(type+'.pdf')}
function scanUrl(){const u=document.getElementById('og-url').value;const r=document.getElementById('og-result');if(!u){r.innerHTML='<p style="color:red">Enter a URL</p>';return}let s=0;if(!u.startsWith('https'))s+=30;if(u.length<15)s+=20;r.innerHTML='<p>Risk Score: '+s+'/100</p><p>Status: '+(s>50?'HIGH RISK':'LOW RISK')+'</p>'}
function routeTo(site){if(site==='ccldr')selectFloor(4);if(site==='omniaguard')selectFloor(2);setTimeout(openFloor,500)}
function animate(){requestAnimationFrame(animate);floorMeshes.forEach((m,i)=>{m.rotation.y+=0.001*(i%2===0?1:-1)});renderer.render(scene,camera)}window.onload=init;
</script><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script></body></html>
