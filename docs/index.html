<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Empire Bootstrap v2</title>
<style>
body{margin:0;background:#05070d;font-family:Arial,sans-serif;color:white;overflow:hidden}
#bootlog{position:absolute;top:10px;left:10px;font-size:12px;line-height:1.4;max-width:50%;z-index:10}
#status{position:absolute;bottom:10px;left:10px;font-size:12px;color:#00ff9d;z-index:10}
#redcube{position:absolute;top:50%;left:50%;width:40px;height:40px;background:red;transform:translate(-50%,-50%);display:none;z-index:20}
#app{width:100vw;height:100vh}
</style>
</head>
<body>
<div id="bootlog">BOOT SEQUENCE INITIATED...</div>
<div id="status">INITIALIZING KERNEL...</div>
<div id="redcube"></div>
<div id="app"></div>
<script>
const log=(msg)=>{const el=document.getElementById("bootlog");el.innerHTML+="<br>"+msg;console.log(msg)};
window.EmpireKernel={modules:{},register(name,module){this.modules[name]=module;log("REGISTERED: "+name)},get(name){return this.modules[name]},async init(){log("KERNEL INIT START");for(const key in this.modules){const m=this.modules[key];if(m&&typeof m.init==="function"){log("INIT MODULE: "+key);await m.init(this);log("OK: "+key)}}log("KERNEL INIT COMPLETE");window.dispatchEvent(new Event("EMPIRE_READY"))}};
</script>
<script src="core/EmpireEventBusV2.js"></script>
<script src="core/EmpireModuleRegistry.js"></script>
<script src="render/EmpireRendererPluginV2.js"></script>
<script>
function require(name){if(!window[name]){log("FAIL: missing "+name);throw new Error(name+" not loaded")}log("FOUND: "+name)}
window.addEventListener("DOMContentLoaded",async()=>{
  log("DOM READY");
  require("EmpireEventBus");require("EmpireModuleRegistry");require("EmpireRendererPluginV2");
  log("REGISTERING MODULES");
  const registry=new EmpireModuleRegistry();
  registry.register("events",window.EmpireEventBus);
  registry.register("renderer",new EmpireRendererPluginV2());
  registry.register("omniaguard",new OmniGuardModule(),["events"]);
  log("STARTING KERNEL");
  registry.initAll(registry);
  const cube=document.getElementById("redcube");cube.style.display="block";
  log("VISUAL BEACON ACTIVE");
  document.getElementById("status").innerText="EMPIRE ONLINE — VISUAL VERIFIED";
});
</script>
</body>
</html>
