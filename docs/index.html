<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Francisco Holdings Inc.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Inter',system-ui,sans-serif;color:#fff}
#canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* Loading */
.loading{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 1.2s cubic-bezier(.4,0,.2,1)}
.loading-logo{font-size:1rem;font-weight:300;letter-spacing:12px;color:#888;margin-bottom:24px}
.loading-bar{width:120px;height:1px;background:#111;position:relative;overflow:hidden}
.loading-bar::after{content:'';position:absolute;left:0;top:0;height:100%;width:0%;background:linear-gradient(90deg,transparent,#00ff88,transparent);animation:load 2s ease forwards}
@keyframes load{0%{width:0%;left:0}50%{width:100%;left:0}100%{width:0%;left:100%}}

/* UI Layer */
#ui{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;justify-content:space-between;padding:40px 24px}
#ui>*{pointer-events:auto}

/* Top bar */
.top-bar{display:flex;justify-content:space-between;align-items:center;width:100%}
.logo{font-size:.65rem;font-weight:600;letter-spacing:4px;color:#888;text-transform:uppercase}
.logo span{color:#00ff88}
.soulstack{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:#ffd700;padding:6px 14px;border-radius:20px;font-size:.55rem;font-weight:700;letter-spacing:1px;backdrop-filter:blur(20px)}

/* Center content */
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;width:90%;max-width:600px}
.title{font-size:clamp(2rem,8vw,4rem);font-weight:200;letter-spacing:8px;line-height:1.1;margin-bottom:16px}
.title .line{display:block}
.title .line1{background:linear-gradient(180deg,#fff 0%,#888 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title .line2{background:linear-gradient(135deg,#00ff88,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:300}
.subtitle{font-size:.75rem;font-weight:300;letter-spacing:6px;color:#666;text-transform:uppercase;margin-bottom:8px}
.tagline{font-size:.65rem;font-weight:400;letter-spacing:3px;color:#00ff88;margin-bottom:40px;opacity:.8}

/* CTA */
.cta-group{display:flex;flex-direction:column;align-items:center;gap:16px}
.cta-btn{background:linear-gradient(135deg,#0070ba,#005ea6);color:#fff;border:none;padding:16px 48px;border-radius:30px;font-size:.85rem;font-weight:600;letter-spacing:2px;cursor:pointer;transition:all .3s;box-shadow:0 4px 30px rgba(0,112,186,.3);text-decoration:none;display:inline-block}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(0,112,186,.5)}
.cta-note{font-size:.55rem;color:#444;letter-spacing:1px}

/* Floor badge */
.floor-badge{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px}
.floor-dot{width:6px;height:6px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88}
.floor-text{font-size:.65rem;letter-spacing:4px;color:#888;font-weight:300}

/* Nav pills */
.nav-pills{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:90%}
.nav-pills a{color:#555;text-decoration:none;font-size:.5rem;letter-spacing:1px;padding:6px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);transition:all .3s;background:rgba(255,255,255,.02)}
.nav-pills a:hover{color:#00ff88;border-color:rgba(0,255,136,.2);background:rgba(0,255,136,.04)}

/* Entrance animations */
.fade-up{opacity:0;transform:translateY(30px);animation:fadeUp 1s cubic-bezier(.4,0,.2,1) forwards}
.delay-1{animation-delay:.5s}
.delay-2{animation-delay:.7s}
.delay-3{animation-delay:.9s}
.delay-4{animation-delay:1.1s}
.delay-5{animation-delay:1.3s}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
</style></head>
<body>

<div class="loading" id="loading">
  <div class="loading-logo">FRANCISCO HOLDINGS</div>
  <div class="loading-bar"></div>
</div>

<div id="canvas"></div>

<div id="ui">
  <div class="top-bar fade-up delay-1">
    <div class="logo">FRANCISCO <span>HOLDINGS</span></div>
    <div class="soulstack">SOULSTACK</div>
  </div>

  <div class="center">
    <div class="subtitle fade-up delay-2">392-FLOOR GLOBAL EMPIRE</div>
    <div class="title fade-up delay-3">
      <span class="line line1">Command</span>
      <span class="line line2">Center</span>
    </div>
    <div class="tagline fade-up delay-4">AGENT SWARM ACTIVE • OMNI WATCHING • PRIMEDOX ONLINE</div>
    
    <div class="cta-group fade-up delay-5">
      <a href="https://paypal.me/franciscoderek7/49" class="cta-btn" onclick="window.open(this.href,'_blank');return false;">ENTER THE EMPIRE — $49</a>
      <div class="cta-note">Secure payment via PayPal</div>
    </div>
  </div>

  <div class="nav-pills fade-up delay-5">
    <a href="omniaguard/">OmniGuard</a>
    <a href="primedox/">PrimeDox</a>
    <a href="vaultvelocityauto/">Vault</a>
    <a href="techpetcage/">TechPet</a>
    <a href="ccldr/">CCLDR</a>
    <a href="weedlaw/">WeedLaw</a>
    <a href="beno-x/">BENO-X</a>
    <a href="cleanswarm/">CleanSwarm</a>
    <a href="kiaros/">Kiaros</a>
    <a href="vigilax/">Vigilax</a>
    <a href="techpackcage/">TechPack</a>
  </div>

  <div class="floor-badge fade-up delay-5">
    <div class="floor-dot"></div>
    <div class="floor-text">FLOOR 1 OF 392</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.0015);

const camera = new THREE.PerspectiveCamera(35, innerWidth/innerHeight, 0.1, 3000);
camera.position.set(0, 8, 45);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
document.getElementById('canvas').appendChild(renderer.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x001a0a, 0.4));
const hemi = new THREE.HemisphereLight(0x00ff88, 0x000000, 0.3);
scene.add(hemi);

const keyLight = new THREE.DirectionalLight(0xffffff, 0.8);
keyLight.position.set(10, 20, 10);
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0x00ff88, 0.5);
rimLight.position.set(-10, 5, -10);
scene.add(rimLight);

const goldLight = new THREE.PointLight(0xffd700, 1, 100);
goldLight.position.set(0, 15, 5);
scene.add(goldLight);

// Ground - subtle reflective plane
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshStandardMaterial({ color: 0x030303, roughness: 0.1, metalness: 0.9 })
);
ground.rotation.x = -Math.PI/2;
ground.position.y = -8;
scene.add(ground);

// The Skyscraper - sleek, premium design
const tower = new THREE.Group();

// Main shaft - very slender, like a real luxury tower
const shaftGeo = new THREE.BoxGeometry(2.5, 35, 2.5);
const shaftMat = new THREE.MeshPhysicalMaterial({
  color: 0x0a0a0a,
  roughness: 0.05,
  metalness: 0.95,
  transmission: 0.2,
  thickness: 2,
  clearcoat: 1,
  clearcoatRoughness: 0.05,
  emissive: 0x001100,
  emissiveIntensity: 0.1
});
const shaft = new THREE.Mesh(shaftGeo, shaftMat);
shaft.position.y = 10;
shaft.castShadow = true;
tower.add(shaft);

// Window strips - vertical glowing lines
const windowMat = new THREE.MeshBasicMaterial({ 
  color: 0x00ff88, 
  transparent: true, 
  opacity: 0.08,
  blending: THREE.AdditiveBlending
});
for(let i = 0; i < 4; i++) {
  const win = new THREE.Mesh(new THREE.BoxGeometry(0.08, 34, 2.55), windowMat);
  win.position.set((i-1.5)*0.6, 10, 0);
  tower.add(win);
}

// Gold spire
const spireGeo = new THREE.ConeGeometry(0.5, 4, 4);
const spireMat = new THREE.MeshStandardMaterial({ 
  color: 0xffd700, 
  metalness: 1, 
  roughness: 0.1,
  emissive: 0xffd700,
  emissiveIntensity: 0.3
});
const spire = new THREE.Mesh(spireGeo, spireMat);
spire.position.y = 29.5;
tower.add(spire);

// Base platform
const baseGeo = new THREE.CylinderGeometry(4, 5, 1, 6);
const baseMat = new THREE.MeshStandardMaterial({ 
  color: 0x111, 
  metalness: 0.9, 
  roughness: 0.1,
  emissive: 0x00ff88,
  emissiveIntensity: 0.05
});
const base = new THREE.Mesh(baseGeo, baseMat);
base.position.y = -7.5;
tower.add(base);

// Entrance glow
const entrance = new THREE.Mesh(
  new THREE.PlaneGeometry(1.5, 2.5),
  new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending })
);
entrance.position.set(0, -6.5, 1.3);
tower.add(entrance);

scene.add(tower);

// Floating rings (elegant, not cluttered)
const ringGroup = new THREE.Group();
const ringMat = new THREE.MeshBasicMaterial({ 
  color: 0x00ff88, 
  transparent: true, 
  opacity: 0.15,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide
});
for(let i = 0; i < 3; i++) {
  const ring = new THREE.Mesh(new THREE.RingGeometry(3 + i*1.5, 3.1 + i*1.5, 64), ringMat);
  ring.rotation.x = Math.PI/2;
  ring.position.y = 8 + i*2;
  ringGroup.add(ring);
}
scene.add(ringGroup);

// Minimal particles - high quality, not noise
const pGeo = new THREE.BufferGeometry();
const pCount = 800;
const pPos = new Float32Array(pCount * 3);
for(let i = 0; i < pCount; i++) {
  pPos[i*3] = (Math.random() - 0.5) * 60;
  pPos[i*3+1] = Math.random() * 40 - 5;
  pPos[i*3+2] = (Math.random() - 0.5) * 60;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
const pMat = new THREE.PointsMaterial({ 
  size: 0.15, 
  color: 0x00ff88, 
  transparent: true, 
  opacity: 0.6,
  blending: THREE.AdditiveBlending
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// Gold dust - very subtle
const gGeo = new THREE.BufferGeometry();
const gCount = 200;
const gPos = new Float32Array(gCount * 3);
for(let i = 0; i < gCount; i++) {
  gPos[i*3] = (Math.random() - 0.5) * 80;
  gPos[i*3+1] = Math.random() * 30;
  gPos[i*3+2] = (Math.random() - 0.5) * 80;
}
gGeo.setAttribute('position', new THREE.BufferAttribute(gPos, 3));
const gMat = new THREE.PointsMaterial({ 
  size: 0.2, 
  color: 0xffd700, 
  transparent: true, 
  opacity: 0.4,
  blending: THREE.AdditiveBlending
});
const goldDust = new THREE.Points(gGeo, gMat);
scene.add(goldDust);

// Animation
let mouseX = 0, mouseY = 0, time = 0;
document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / innerWidth) * 2 - 1;
  mouseY = (e.clientY / innerHeight) * 2 - 1;
});

function animate() {
  requestAnimationFrame(animate);
  time += 0.003;

  tower.rotation.y = Math.sin(time * 0.5) * 0.05;
  
  ringGroup.rotation.y += 0.002;
  ringGroup.children.forEach((ring, i) => {
    ring.rotation.x = Math.PI/2 + Math.sin(time + i) * 0.1;
  });

  particles.rotation.y += 0.0002;
  goldDust.rotation.y -= 0.0001;

  // Smooth camera
  camera.position.x += (mouseX * 3 - camera.position.x) * 0.02;
  camera.position.y += (8 + mouseY * 2 - camera.position.y) * 0.02;
  camera.lookAt(0, 8, 0);

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Remove loading
setTimeout(() => {
  document.getElementById('loading').style.opacity = '0';
  setTimeout(() => document.getElementById('loading').remove(), 1200);
}, 2000);
</script>
</body>
</html>
