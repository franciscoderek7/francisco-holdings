<!DOCTYPE html>

<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Inter','Segoe UI',system-ui,sans-serif}
#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}
#ui *{pointer-events:auto}
h1{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:2.8rem;font-weight:300;letter-spacing:14px;text-transform:uppercase;background:linear-gradient(135deg,#00ff88,#ffd700,#00ff88);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s ease infinite;text-shadow:0 0 80px rgba(0,255,136,0.3)}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
p.sub{position:absolute;top:72px;left:50%;transform:translateX(-50%);color:#888;font-size:.7rem;letter-spacing:6px;text-transform:uppercase}
.tag{position:absolute;top:105px;left:50%;transform:translateX(-50%);color:#00ff88;font-size:.55rem;letter-spacing:3px;border:1px solid rgba(0,255,136,.2);padding:5px 16px;border-radius:20px;background:rgba(0,255,136,.03);backdrop-filter:blur(10px)}
.badge{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.5);border:1px solid rgba(255,215,0,.3);padding:10px 28px;border-radius:30px;color:#ffd700;font-size:.75rem;letter-spacing:3px;backdrop-filter:blur(15px)}
.pp{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0070ba,#005ea6);color:#fff;padding:16px 48px;border-radius:30px;text-decoration:none;font-size:.9rem;letter-spacing:3px;font-weight:700;box-shadow:0 0 50px rgba(0,112,186,.5);transition:all .3s;border:none;cursor:pointer}
.pp:hover{transform:translateX(-50%) scale(1.06);box-shadow:0 0 80px rgba(0,112,186,.8)}
.ss{position:absolute;top:24px;right:24px;background:linear-gradient(135deg,#ffd700,#ff8800);color:#000;padding:8px 18px;border-radius:20px;font-size:.65rem;font-weight:800;letter-spacing:1px;box-shadow:0 0 30px rgba(255,215,0,.3)}
.nav{position:absolute;bottom:170px;left:50%;transform:translateX(-50%);display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:90%}
.nav a{color:#666;text-decoration:none;font-size:.5rem;letter-spacing:1px;border:1px solid rgba(255,255,255,.1);padding:4px 10px;border-radius:8px;backdrop-filter:blur(5px);transition:all .3s}
.nav a:hover{color:#00ff88;border-color:rgba(0,255,136,.4);background:rgba(0,255,136,.05)}
.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1s}
.loading-text{color:#00ff88;font-size:.8rem;letter-spacing:8px;text-transform:uppercase;margin-bottom:20px}
.loading-bar{width:200px;height:2px;background:#111;border-radius:2px;overflow:hidden}
.loading-fill{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#ffd700);animation:load 2s ease forwards}
@keyframes load{0%{width:0%}100%{width:100%}}
</style></head>
<body>
<div class="loading" id="loading"><div class="loading-text">INITIALIZING EMPIRE</div><div class="loading-bar"><div class="loading-fill"></div></div></div>
<div id="c"></div>
<div id="ui">
<div class="ss">SOULSTACK VERIFIED</div>
<h1>Francisco Holdings Inc.</h1>
<p class="sub">392-Floor Global Empire Command Center</p>
<div class="tag">AGENT SWARM ACTIVE • OMNI WATCHING • PRIMEDOX ONLINE</div>
<div class="nav">

<a href="ccldr/">F6</a><a href="weedlaw/">F7</a><a href="beno-x/">F8</a><a href="cleanswarm/">F9</a>
<a href="kiaros/">F10</a><a href="vigilax/">F11</a><a href="techpackcage/">F12</a>
</div>
<a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">ENTER THE EMPIRE — $49</a>
<div class="badge">FLOOR 1 OF 392</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
if('serviceWorker' in navigator)navigator.serviceWorker.getRegistrations().then(r=>r.forEach(x=>x.unregister()));

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,.001);

const camera=new THREE.PerspectiveCamera(40,innerWidth/innerHeight,.1,5e3);
camera.position.set(50,40,140);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:"high-performance"});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.4;
document.getElementById("c").appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x001a0a,.3));
const hemi=new THREE.HemisphereLight(0x00ff88,0x000000,.5);
scene.add(hemi);
const moon=new THREE.DirectionalLight(0x00ff88,1.5);
moon.position.set(100,250,80);moon.castShadow=true;
moon.shadow.mapSize.width=2048;moon.shadow.mapSize.height=2048;
scene.add(moon);
const goldLight=new THREE.PointLight(0xffd700,3,400);
goldLight.position.set(-50,100,50);scene.add(goldLight);
const blueRim=new THREE.SpotLight(0x0088ff,2,500,Math.PI/6,.3,1);
blueRim.position.set(80,120,-60);scene.add(blueRim);

const floor=new THREE.Mesh(new THREE.PlaneGeometry(2e3,2e3),new THREE.MeshStandardMaterial({color:0x050505,roughness:.02,metalness:.98}));
floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;scene.add(floor);

const tower=new THREE.Group();
const glassMat=new THREE.MeshPhysicalMaterial({color:0x020202,roughness:.05,metalness:.95,transmission:.4,thickness:3,transparent:true,opacity:.9,clearcoat:1,clearcoatRoughness:.05});
const lobbyMat=new THREE.MeshPhysicalMaterial({color:0x0a1a0a,roughness:.05,metalness:.95,transmission:.5,thickness:4,transparent:true,opacity:.95,emissive:0x00ff88,emissiveIntensity:.2,clearcoat:1});
const goldMat=new THREE.MeshStandardMaterial({color:0xffd700,roughness:.05,metalness:1,emissive:0xffd700,emissiveIntensity:.6});

for(let fl=0;fl<39;fl++){
  const y=fl*5+2.5;const isLobby=fl<3;const w=isLobby?28:22;const mat=isLobby?lobbyMat:glassMat;
  const box=new THREE.Mesh(new THREE.BoxGeometry(w,4.8,w),mat);
  box.position.y=y;box.castShadow=true;box.receiveShadow=true;tower.add(box);
  if(!isLobby)for(let side=0;side<4;side++){
    const win=new THREE.Mesh(new THREE.PlaneGeometry(w*.7,3.8),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.1,blending:THREE.AdditiveBlending}));
    const a=side*Math.PI/2;
    win.position.set(Math.sin(a)*(w/2+.05),y,Math.cos(a)*(w/2+.05));
    win.rotation.y=a+Math.PI;tower.add(win);
  }
  if(fl%10==0&&fl>0){
    const trim=new THREE.Mesh(new THREE.BoxGeometry(w+.6,.3,w+.6),goldMat);
    trim.position.y=y+2.5;tower.add(trim);
  }
}

const lobby=new THREE.Group();
const pillarGeo=new THREE.CylinderGeometry(1.2,1.5,14,16);
for(let i=0;i<4;i++){
  const a=(i/4)*Math.PI*2;
  const pillar=new THREE.Mesh(pillarGeo,goldMat);
  pillar.position.set(Math.cos(a)*12,7,Math.sin(a)*12);pillar.castShadow=true;lobby.add(pillar);
}
const ceil=new THREE.Mesh(new THREE.BoxGeometry(30,.3,30),goldMat);ceil.position.y=14;lobby.add(ceil);
const archGlow=new THREE.Mesh(new THREE.PlaneGeometry(16,10),new THREE.MeshBasicMaterial({color:0x00ff88,transparent:true,opacity:.3,blending:THREE.AdditiveBlending}));
archGlow.position.set(0,5,16);lobby.add(archGlow);
const frameTop=new THREE.Mesh(new THREE.BoxGeometry(18,1,1),goldMat);frameTop.position.set(0,10.5,16);lobby.add(frameTop);
const frameL=new THREE.Mesh(new THREE.BoxGeometry(1,10,1),goldMat);frameL.position.set(-8.5,5,16);lobby.add(frameL);
const frameR=new THREE.Mesh(new THREE.BoxGeometry(1,10,1),goldMat);frameR.position.set(8.5,5,16);lobby.add(frameR);
tower.add(lobby);scene.add(tower);

for(let i=0;i<50;i++){
  const h=20+Math.random()*120;
  const bld=new THREE.Mesh(new THREE.BoxGeometry(6+Math.random()*14,h,6+Math.random()*14),new THREE.MeshStandardMaterial({color:0x060606,roughness:.3,metalness:.8,emissive:0x001100,emissiveIntensity:.03}));
  const ang=(i/50)*Math.PI*2;
  const dist=200+Math.random()*150;
  bld.position.set(Math.cos(ang)*dist,h/2,Math.sin(ang)*dist);
  bld.castShadow=true;scene.add(bld);
}

const fGeo=new THREE.BufferGeometry(),fCount=4e3,fPos=new Float32Array(fCount*3);
for(let i=0;i<fCount;i++){fPos[i*3]=(Math.random()-.5)*100;fPos[i*3+1]=Math.random()*120;fPos[i*3+2]=(Math.random()-.5)*100;}
fGeo.setAttribute("position",new THREE.BufferAttribute(fPos,3));
const fMat=new THREE.PointsMaterial({size:1,color:0x00ff88,transparent:true,opacity:.6,blending:THREE.AdditiveBlending});
const fountain=new THREE.Points(fGeo,fMat);scene.add(fountain);

const gGeo=new THREE.BufferGeometry(),gCount=2e3,gPos=new Float32Array(gCount*3);
for(let i=0;i<gCount;i++){gPos[i*3]=(Math.random()-.5)*300;gPos[i*3+1]=Math.random()*200;gPos[i*3+2]=(Math.random()-.5)*300;}
gGeo.setAttribute("position",new THREE.BufferAttribute(gPos,3));
const gMat=new THREE.PointsMaterial({size:.6,color:0xffd700,transparent:true,opacity:.4,blending:THREE.AdditiveBlending});
const goldDust=new THREE.Points(gGeo,gMat);scene.add(goldDust);

const swarm=[];
for(let i=0;i<12;i++){
  const orb=new THREE.Mesh(new THREE.SphereGeometry(.4,16,16),new THREE.MeshBasicMaterial({color:0x00ffff}));
  swarm.push({mesh:orb,angle:i/12*Math.PI*2,radius:15+Math.random()*12,speed:.4+Math.random()*1.2,y:8+Math.random()*25});
  scene.add(orb);
}

let mx=0,my=0,ty=40,time=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.1;ty=Math.max(20,Math.min(ty,180))});

function animate(){
  requestAnimationFrame(animate);time+=.005;
  tower.rotation.y=Math.sin(time*.08)*.01;
  fountain.rotation.y+=.0002;
  const fp=fountain.geometry.attributes.position.array;
  for(let i=0;i<fCount;i++){fp[i*3+1]+=.02;if(fp[i*3+1]>120)fp[i*3+1]=0;}
  fountain.geometry.attributes.position.needsUpdate=true;
  goldDust.rotation.y-=.0001;
  swarm.forEach(o=>{o.angle+=o.speed*.008;o.mesh.position.set(Math.cos(o.angle)*o.radius,o.y+Math.sin(time*2+o.angle)*2,Math.sin(o.angle)*o.radius)});
  camera.position.x+=(mx*30-camera.position.x)*.015;
  camera.position.y+=(ty-camera.position.y)*.04;
  camera.position.z=140+Math.sin(time*.2)*4;
  camera.lookAt(0,ty*.3,0);
  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

setTimeout(()=>{
  document.getElementById("loading").style.opacity="0";
  setTimeout(()=>document.getElementById("loading").remove(),1000);
},2500);
</script></body></html>
