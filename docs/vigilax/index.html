<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>Vigilax | Security & Surveillance</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#000;overflow:hidden;font-family:system-ui,sans-serif}#c{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1}#ui{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;pointer-events:none}#ui *{pointer-events:auto}
h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2.6rem;font-weight:200;letter-spacing:10px;text-transform:uppercase;background:linear-gradient(135deg,#ff0000,#000000);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 50px rgba(255,0,0,.3)}

.badge{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(255,0,0,.08);border:1px solid rgba(255,0,0,.3);padding:10px 28px;border-radius:20px;color:#ff4444;font-size:.8rem;letter-spacing:2px}

</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK</div><h1>VIGILAX</h1><p class="sub">Security & Surveillance Systems | Floor 11</p><div class="tag">AGENT SWARM ACTIVE • CAMERAS ONLINE • FULL AUTOMATION</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">SECURE PERIMETER — $199/mo</a><div class="badge">FLOOR 11 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,20,80);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.1;
document.getElementById("c").appendChild(r.domElement);
s.add(new THREE.AmbientLight(0x1a0000,.4));
const g=new THREE.PointLight(0xff0000,1.5,400);g.position.set(0,50,100);s.add(g);
const b=new THREE.PointLight(0x440000,1,400);b.position.set(-80,30,-50);s.add(b);

// Surveillance grid
const grid=new THREE.Group();
const gridMat=new THREE.MeshBasicMaterial({color:0x330000,transparent:true,opacity:.3});
for(let x=-10;x<=10;x+=2){
  const line=new THREE.Mesh(new THREE.BoxGeometry(.1,40,.1),gridMat);
  line.position.set(x*3,20,0);grid.add(line);
}
for(let y=0;y<=40;y+=2){
  const line=new THREE.Mesh(new THREE.BoxGeometry(60,.1,.1),gridMat);
  line.position.set(0,y,0);grid.add(line);
}
s.add(grid);

// Camera array
const cameras=[];
const camBodyMat=new THREE.MeshStandardMaterial({color:0x111,metalness:.9,roughness:.1});
const lensMat=new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:.5});
for(let i=0;i<8;i++){
  const cam=new THREE.Group();
  const body=new THREE.Mesh(new THREE.BoxGeometry(3,2,4),camBodyMat);cam.add(body);
  const lens=new THREE.Mesh(new THREE.CylinderGeometry(1,1,1,16),lensMat);
  lens.rotation.x=Math.PI/2;lens.position.z=2.5;cam.add(lens);
  const a=i/8*Math.PI*2;
  cam.position.set(Math.cos(a)*25,20,Math.sin(a)*25);
  cam.lookAt(0,20,0);cameras.push(cam);s.add(cam);
}

// Red alert particles
const aGeo=new THREE.BufferGeometry(),aCount=2e3,aPos=new Float32Array(aCount*3);
for(let i=0;i<aCount;i++){aPos[i*3]=(Math.random()-.5)*200;aPos[i*3+1]=Math.random()*80;aPos[i*3+2]=(Math.random()-.5)*200;}
aGeo.setAttribute("position",new THREE.BufferAttribute(aPos,3));
const aMat=new THREE.PointsMaterial({size:.7,color:0xff0000,transparent:true,opacity:.5});
const alertP=new THREE.Points(aGeo,aMat);s.add(alertP);

let mx=0,my=0,ty=20,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.05;ty=Math.max(10,Math.min(ty,80))});
function a(){requestAnimationFrame(a);t+=.005;
alertP.rotation.y+=.0003;
c.position.x+=(mx*20-c.position.x)*.02;c.position.y+=(ty-c.position.y)*.05;c.position.z=80+Math.sin(t)*5;c.lookAt(0,20,0);r.render(s,c);
}a();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script></body></html>
