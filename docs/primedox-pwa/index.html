<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><meta name="theme-color" content="#00A86B"><title>PrimeDox AI HQ</title><link rel="manifest" href="manifest.json"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0f0a;color:#00ff88;min-height:100vh}.gate{position:fixed;inset:0;background:#0a0f0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center}.gate h1{font-size:32px;letter-spacing:4px;margin-bottom:8px;color:#FFD700}.gate input{background:#0f1f0f;border:1px solid #00ff88;color:#00ff88;padding:16px;font-size:18px;text-align:center;border-radius:8px;width:100%;max-width:320px;margin-bottom:12px}.gate .btn{background:#00ff88;color:#000;border:none;padding:16px 32px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer;width:100%;max-width:320px}.gate .error{color:#ff4444;margin-top:12px;font-size:14px;display:none}.app{display:none}.header{text-align:center;padding:24px 16px;background:linear-gradient(180deg,#0a1f0a 0%,#0a0f0a 100%);border-bottom:1px solid #00ff88}.header h1{font-size:28px;letter-spacing:4px;color:#FFD700}.chat-container{padding:16px;max-width:600px;margin:0 auto}.chat-box{background:#0f1f0f;border:1px solid #003300;border-radius:12px;height:300px;overflow-y:auto;padding:16px;margin-bottom:16px}.message{margin-bottom:12px;padding:12px 16px;border-radius:12px;max-width:80%;font-size:14px;line-height:1.5}.message.bot{background:#003300;color:#00ff88;margin-right:auto;border-bottom-left-radius:4px}.message.user{background:#00ff88;color:#000;margin-left:auto;border-bottom-right-radius:4px}.input-area{display:flex;gap:8px}input{flex:1;background:#0f1f0f;border:1px solid #00ff88;color:#00ff88;padding:14px;font-size:16px;border-radius:8px}.send-btn{background:#00ff88;color:#000;border:none;padding:14px 24px;font-size:16px;font-weight:bold;border-radius:8px;cursor:pointer}.actions{padding:24px 16px;max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:12px}.action-btn{background:#0f1f0f;border:1px solid #00ff88;color:#00ff88;padding:18px;font-size:16px;border-radius:8px;text-align:center;text-decoration:none;display:block}.action-btn.primary{background:#FFD700;border-color:#FFD700;color:#000;font-weight:bold}</style></head><body><div class="gate" id="gate"><h1>PRIMEDOX AI</h1><p>Enter access code</p><input type="text" id="codeInput" placeholder="XXXX-XXXX-XXXX" maxlength="20"><button class="btn" onclick="unlock()">ENTER HQ</button><div class="error" id="error">Invalid code.</div></div><div class="app" id="app"><div class="header"><h1>PrimeDox AI</h1><p>Your AI Concierge</p></div><div class="chat-container"><div class="chat-box" id="chatBox"><div class="message bot">Welcome to PrimeDox AI HQ. I am PRIME.</div></div><div class="input-area"><input type="text" id="userInput" placeholder="Type your request..." onkeypress="if(event.key==='Enter')send()"><button class="send-btn" onclick="send()">Send</button></div></div><div class="actions"><a href="https://franciscoderek7.github.io/francisco-holdings/docs/ccldr-pwa/index.html" class="action-btn primary">Generate Legal Document</a><a href="https://franciscoderek7.github.io/francisco-holdings/docs/omniaguard-pwa/index.html" class="action-btn">Security Scan</a><a href="mailto:franciscoderek7@gmail.com" class="action-btn">Contact Support</a></div></div><script>const VALID=["d35dc16450a130c39964d39b6916033a0d81bc883eeb8a67bd2973150b2db72b","e490a64e68b79d90387359f6f13aaa6fa98256417b1758bf7f28bca36fa27def","f8a11507bf1c4719fc880db35339e770d7fa5c735997e329b3a3193f134a75b9","788b43bbc8b873dce94733817b89ec143711e6ee7484bc3f8bb84100fd01803e","529bf9a5ba0cd18c4cd4a568ae28261a52247a7adc9ae430db1960c2593fc6fc"];async function sha256(t){const e=new TextEncoder().encode(t),b=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('')}async function unlock(){const c=document.getElementById('codeInput').value.trim().toUpperCase();const h=await sha256(c);if(VALID.includes(h)){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';localStorage.setItem('prime_access','granted')}else{document.getElementById('error').style.display='block'}}if(localStorage.getItem('prime_access')==='granted'){document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block'}function send(){const i=document.getElementById('userInput');const t=i.value.trim();if(!t)return;const c=document.getElementById('chatBox');c.innerHTML+=`<div class="message user">${t}</div>`;i.value='';c.scrollTop=c.scrollHeight;setTimeout(()=>{c.innerHTML+=`<div class="message bot">I can route you to CCLDR for legal documents or OmniGuard for security. What do you need?</div>`;c.scrollTop=c.scrollHeight;},600);}if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js')}</script></body></html>
