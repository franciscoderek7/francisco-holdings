<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta http-equiv="Cache-Control" content="no-cache"><title>CleanSwarm | Intelligent Cleaning</title>

h1{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:2.6rem;font-weight:200;letter-spacing:10px;text-transform:uppercase;background:linear-gradient(135deg,#00aaff,#ffffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 50px rgba(0,170,255,.3)}

</style></head><body><div id="c"></div><div id="ui"><div class="ss">SOULSTACK</div><h1>CLEANSWARM</h1><p class="sub">Intelligent Cleaning Systems | Floor 9</p><div class="tag">AGENT SWARM ACTIVE • DRONE SWARM ONLINE • FULL AUTOMATION</div><a href="https://www.paypal.com/paypalme/franciscoderek7" class="pp" target="_blank">CLEAN WITH AI — $49/mo</a><div class="badge">FLOOR 9 OF 392</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,20,80);
const r=new THREE.WebGLRenderer({antialias:true});
r.setSize(innerWidth,innerHeight);r.setPixelRatio(Math.min(devicePixelRatio,2));
r.shadowMap.enabled=true;r.toneMapping=THREE.ACESFilmicToneMapping;
r.toneMappingExposure=1.1;
document.getElementById("c").appendChild(r.domElement);
s.add(new THREE.AmbientLight(0x001a2a,.4));
const g=new THREE.PointLight(0x00aaff,1.5,400);g.position.set(0,50,100);s.add(g);
const b=new THREE.PointLight(0xffffff,1,400);b.position.set(-80,30,-50);s.add(b);

// Cleaning drones
const drones=[];
const droneMat=new THREE.MeshPhysicalMaterial({color:0x00aaff,metalness:.8,roughness:.2,emissive:0x00aaff,emissiveIntensity:.3,clearcoat:1});
for(let i=0;i<20;i++){
  const drone=new THREE.Group();
  const body=new THREE.Mesh(new THREE.SphereGeometry(1.5,16,16),droneMat);drone.add(body);
  const prop=new THREE.Mesh(new THREE.CylinderGeometry(.1,1.5,.1,16),new THREE.MeshStandardMaterial({color:0xffffff,metalness:1}));
  prop.position.y=1;drone.add(prop);
  const a=i/20*Math.PI*2;
  drone.position.set(Math.cos(a)*20,15+Math.random()*10,Math.sin(a)*20);
  drones.push({group:drone,angle:a,speed:.5+Math.random(),yBase:drone.position.y});s.add(drone);
}

// Bubbles
const bubGeo=new THREE.BufferGeometry(),bubCount=2e3,bubPos=new Float32Array(bubCount*3);
for(let i=0;i<bubCount;i++){bubPos[i*3]=(Math.random()-.5)*200;bubPos[i*3+1]=Math.random()*80;bubPos[i*3+2]=(Math.random()-.5)*200;}
bubGeo.setAttribute("position",new THREE.BufferAttribute(bubPos,3));
const bubMat=new THREE.PointsMaterial({size:1.2,color:0x00aaff,transparent:true,opacity:.3});
const bubbles=new THREE.Points(bubGeo,bubMat);s.add(bubbles);

let mx=0,my=0,ty=20,t=0;
document.addEventListener("mousemove",e=>{mx=(e.clientX/innerWidth)*2-1;my=(e.clientY/innerHeight)*2-1});
addEventListener("wheel",e=>{ty+=e.deltaY*.05;ty=Math.max(10,Math.min(ty,80))});
function a(){requestAnimationFrame(a);t+=.005;
drones.forEach(d=>{d.angle+=d.speed*.01;d.group.position.set(Math.cos(d.angle)*20,d.yBase+Math.sin(t*d.speed)*3,Math.sin(d.angle)*20);d.group.children[1].rotation.y+=.3});
bubbles.rotation.y+=.0003;
c.position.x+=(mx*20-c.position.x)*.02;c.position.y+=(ty-c.position.y)*.05;c.position.z=80+Math.sin(t)*5;c.lookAt(0,20,0);r.render(s,c);
}a();
addEventListener("resize",()=>{c.aspect=innerWidth/innerHeight;c.updateProjectionMatrix();r.setSize(innerWidth,innerHeight)});
</script></body></html>
