<script>
const s=new THREE.Scene();s.fog=new THREE.FogExp2(0x000000,.003);
const c=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,3e3);
c.position.set(0,20,80);

const bladeMat=new THREE.MeshPhysicalMaterial({color:0x228b22,roughness:.3,metalness:.5,emissive:0x228b22,emissiveIntensity:.2,clearcoat:1});
for(let i=0;i<7;i++){
  const blade=new THREE.Mesh(new THREE.ConeGeometry(3,12,4),bladeMat);
  const a=(i/7)*Math.PI*2;
  blade.position.set(Math.cos(a)*5,25,Math.sin(a)*5);
  blade.rotation.z=Math.PI/3;blade.rotation.y=a;
  leaf.add(blade);
}

const stem=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,15,16),stemMat);stem.position.y=15;leaf.add(stem);

// Constitutional books
const books=[];
for(let i=0;i<6;i++){
  const bookMat=new THREE.MeshStandardMaterial({color:0x8b4513,roughness:.8,metalness:.1});
  const book=new THREE.Mesh(new THREE.BoxGeometry(4,5,1),bookMat);
  book.position.set((i-2.5)*6,5,0);book.rotation.y=i*.2;
  books.push(book);s.add(book);
}

// Green mist
const mGeo=new THREE.BufferGeometry(),mCount=3e3,mPos=new Float32Array(mCount*3);
for(let i=0;i<mCount;i++){mPos[i*3]=(Math.random()-.5)*200;mPos[i*3+1]=Math.random()*80;mPos[i*3+2]=(Math.random()-.5)*200;}

}a();
