<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Francisco Holdings Inc. — 3D Skyscraper Preview</title>
<meta name="robots" content="noindex, nofollow">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',Arial,sans-serif}
  #viewport{position:fixed;inset:0}
  #viewport canvas{display:block}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
       padding:14px 18px;background:linear-gradient(180deg,rgba(0,0,0,0.85),rgba(0,0,0,0));
       z-index:10;pointer-events:none}
  #hud .brand{color:#D4AF37;font-weight:700;letter-spacing:1px;font-size:14px;pointer-events:auto}
  #status{color:#c0c0c0;font-size:12px;pointer-events:auto}
  #floor-bar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:10px;justify-content:center;
             padding:16px;background:linear-gradient(0deg,rgba(0,0,0,0.85),rgba(0,0,0,0));z-index:10}
  .floor-btn,#lobby-btn{background:#111;border:1px solid #D4AF37;color:#D4AF37;font-size:12px;
             padding:10px 16px;border-radius:6px;cursor:pointer;letter-spacing:0.5px;transition:all .15s}
  .floor-btn:hover,#lobby-btn:hover{background:#D4AF37;color:#000}
  #floor-content-overlay{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
             opacity:0;transition:opacity 0.4s ease;pointer-events:none;z-index:5}
  #floor-content-inner{color:#fff;text-align:center;font-family:Inter,Arial,sans-serif;
             font-size:28px;letter-spacing:1px;text-shadow:0 0 18px rgba(74,144,226,0.6)}
</style>
</head>
<body>

<div id="viewport"></div>

<div id="hud">
  <div class="brand">FRANCISCO HOLDINGS — PHOENIX TOWER (3D PREVIEW)</div>
  <div id="status">Lobby</div>
</div>

<div id="floor-content-overlay"><div id="floor-content-inner"></div></div>

<div id="floor-bar">
  <button id="lobby-btn">Lobby</button>
  <!-- floor buttons injected by floor-registry.js below -->
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { Engine } from './empire/engine.js';
  import { SkyscraperBuilding } from './empire/scene.js';
  import { getRegisteredFloors, getFloorLabel } from './empire/floor-registry.js';
  import { ElevatorAudio } from './empire/audio-engine.js';

  const container = document.getElementById('viewport');
  const engine = new Engine(container, { THREE });
  const building = new SkyscraperBuilding(THREE);
  engine.mount(building);
  engine.start();

  const audio = new ElevatorAudio();
  audio.connect(building);

  const status = document.getElementById('status');
  const contentOverlay = document.getElementById('floor-content-overlay');
  const contentInner = document.getElementById('floor-content-inner');
  building.on('elevator:doors-closing', () => { status.textContent = 'Doors closing...'; contentOverlay.style.opacity = '0'; });
  building.on('elevator:loading', ({ label }) => { status.textContent = `Loading ${label || 'floor'}...`; });
  building.on('elevator:doors-opening', ({ label }) => { status.textContent = `Arriving: ${label || 'Lobby'}`; });
  building.on('elevator:arrived', ({ label }) => {
    status.textContent = `Floor: ${label || 'Lobby'}`;
    contentInner.textContent = label || 'Lobby';
    contentOverlay.style.opacity = '1'; // fades in only once doors are fully open (0.4s ease, per spec)
  });
  building.on('elevator:error', ({ error }) => { status.textContent = `Error: ${error.message}`; });

  const floorBar = document.getElementById('floor-bar');
  getRegisteredFloors().forEach((floor) => {
    const btn = document.createElement('button');
    btn.className = 'floor-btn';
    btn.textContent = `Floor ${floor} — ${getFloorLabel(floor)}`;
    btn.onclick = () => building.goToFloor(floor);
    floorBar.appendChild(btn);
  });

  document.getElementById('lobby-btn').onclick = () => building.returnToLobby();
</script>

</body>
</html>
